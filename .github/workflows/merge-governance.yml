name: merge-governance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pull-requests: read

jobs:
  merge-governance-advisory:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branch refs for drift checks
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build advisory merge debt matrix
        run: python scripts/merge_governance/build_merge_debt_matrix.py --skip-diff-scan --limit 40

      - name: Upload advisory merge governance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-governance-advisory
          path: |
            artifacts/merge_debt_matrix.json
            artifacts/merge_debt_matrix.md
          if-no-files-found: error
