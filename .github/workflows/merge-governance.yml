name: merge-governance

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pull-requests: read

jobs:
  merge-debt-matrix:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branch refs for drift checks
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build merge debt matrix
        run: python scripts/merge_governance/build_merge_debt_matrix.py

      - name: Build Q-owner queue status
        run: python scripts/merge_governance/build_q_owner_queue.py

      - name: Upload merge debt matrix
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: merge-debt-matrix
          path: |
            artifacts/merge_debt_matrix.json
            artifacts/merge_debt_matrix.md
            artifacts/q_owner_queue_status.json
            artifacts/q_owner_queue_status.md
          if-no-files-found: error
