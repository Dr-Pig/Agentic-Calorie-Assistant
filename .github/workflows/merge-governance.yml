name: merge-governance

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pull-requests: read

jobs:
  merge-debt-matrix:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branch refs for drift checks
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check pre-PR quality gate
        run: python scripts/merge_governance/pre_pr_quality_gate.py --output artifacts/pre_pr_quality_gate_report.json

      - name: Check pre-queue readiness
        run: python scripts/merge_governance/check_pre_queue_readiness.py --output artifacts/pre_queue_readiness_report.json

      - name: Build merge debt matrix
        run: |
          args=""
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            args="--skip-diff-scan --limit 40"
          fi
          python scripts/merge_governance/build_merge_debt_matrix.py $args

      - name: Build Q-owner queue status
        if: ${{ github.event_name != 'merge_group' }}
        run: python scripts/merge_governance/build_q_owner_queue.py

      - name: Upload merge debt matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-debt-matrix
          path: |
            artifacts/merge_debt_matrix.json
            artifacts/merge_debt_matrix.md
            artifacts/q_owner_queue_status.json
            artifacts/q_owner_queue_status.md
            artifacts/pre_pr_quality_gate_report.json
            artifacts/pre_queue_readiness_report.json
          if-no-files-found: error
