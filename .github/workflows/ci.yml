          import json
          from pathlib import Path
          stack = {
              "artifact_type": "synthetic_ci_pl_ce_pr_stack_metadata_fixture",
              "metadata_source": "ci_static_fixture",
              "merge_owner_required": True,
              "producer_should_merge": False,
