            artifacts/accurate_intake_pl_ce_browser_activation_evidence_gate_ci.json
            artifacts/accurate_intake_pl_ce_activation_review_manifest_ci.json
            artifacts/accurate_intake_pl_ce_serial_handoff_ci.json
            artifacts/accurate_intake_pl_ce_pr_stack_metadata_ci.json
            artifacts/product_pages_visual_qa_ci
          if-no-files-found: error

      - name: Upload PL+CE UI/context alignment pack report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-pl-ce-ui-context-alignment-pack-report
          path: artifacts/accurate_intake_pl_ce_ui_context_alignment_pack_ci.json
          if-no-files-found: error

  wave1-phase-a-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
