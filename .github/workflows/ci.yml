          PY
          python scripts/build_accurate_intake_pl_ce_serial_handoff.py \
            --activation-review-manifest artifacts/accurate_intake_pl_ce_activation_review_manifest_ci.json \
            --stack-json artifacts/accurate_intake_pl_ce_pr_stack_metadata_ci.json \
            --output artifacts/accurate_intake_pl_ce_serial_handoff_ci.json \
            --allow-blocked

      - name: Upload product pages browser E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-product-pages-browser-smoke-report
          path: |
            artifacts/accurate_intake_product_pages_browser_smoke_ci.json
            artifacts/accurate_intake_product_pages_seven_day_diary_smoke_ci.json
            artifacts/accurate_intake_product_pages_short_term_context_smoke_ci.json
