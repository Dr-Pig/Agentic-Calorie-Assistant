name: ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_call:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONUTF8: "1"

jobs:
  repo-hygiene-and-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PR diff quality gate
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: |
          git fetch --no-tags origin main
          BASE_SHA="$(git merge-base origin/main HEAD)"
          python scripts/merge_governance/pre_pr_quality_gate.py --base-ref "$BASE_SHA" --head-ref HEAD --output artifacts/pre_pr_quality_gate_ci.json --skip-boundary-checks

      - name: Run repo hygiene and architecture hooks
        run: pre-commit run --all-files

  runtime-contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run single-manager contract test wall
        run: |
          python -m pytest \
            tests/test_domain_first_guardrails.py \
            tests/test_manager_service.py \
            tests/test_deepseek_adapter.py \
            tests/test_builderspace_adapter.py \
            tests/test_bootstrap_semantic_ownership_guardrails.py \
            tests/test_long_term_context_shadow_lab_guards.py \
            tests/test_runner_timeout_contract.py \
            tests/test_tavily_timeout_contract.py \
            tests/test_text_integrity.py \
            tests/test_workflow_routing_decision.py \
            -q

  product-pages-browser-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Select product pages browser E2E mode
        id: browser_mode
        run: |
          BASE_SHA=""
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "merge_group" ]; then
            git fetch --no-tags origin main
            BASE_SHA="$(git merge-base origin/main HEAD)"
          fi
          python scripts/select_product_pages_browser_e2e_mode.py --base-ref "$BASE_SHA" --head-ref HEAD --event-name "${{ github.event_name }}" --output artifacts/product_pages_browser_e2e_selection_ci.json --github-output "$GITHUB_OUTPUT"

      - name: Fast pass product pages browser E2E
        if: steps.browser_mode.outputs.mode == 'fast_pass'
        run: |
          cat artifacts/product_pages_browser_e2e_selection_ci.json

      - name: Install Playwright browser dependencies
        if: steps.browser_mode.outputs.mode == 'full'
        run: |
          python -m pip install playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Run product pages browser E2E diagnostic
        if: steps.browser_mode.outputs.mode == 'full'
        run: |
          python -m pytest tests/test_accurate_intake_product_pages_renderer_source_map.py tests/test_accurate_intake_product_pages_renderer_source_closure_gate.py tests/test_accurate_intake_product_pages_context_target_browser_closure.py tests/test_accurate_intake_today_macro_panel_behavior.py tests/test_accurate_intake_today_macro_mirror_gate.py tests/test_accurate_intake_today_macro_runtime_mirror_gate.py tests/test_accurate_intake_body_observation_same_truth_gate.py tests/test_accurate_intake_clarify_commit_correction_same_truth_gate.py tests/test_current_shell_compatibility_product_pages_self_use_flow_gate.py tests/test_current_shell_compatibility_browser_activation_evidence_gate.py tests/test_accurate_intake_product_pages_browser_smoke.py tests/test_accurate_intake_product_pages_body_noplan_degraded_smoke.py tests/test_accurate_intake_product_pages_short_term_context_smoke.py tests/test_accurate_intake_product_pages_target_candidate_ui_smoke.py tests/test_accurate_intake_product_pages_visual_qa.py tests/test_accurate_intake_product_pages_static.py tests/test_accurate_intake_static_cjk_copy_integrity.py -q
          python scripts/run_accurate_intake_product_pages_browser_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_browser_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_body_noplan_degraded_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_body_noplan_degraded_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_short_term_context_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_short_term_context_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_target_candidate_ui_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_target_candidate_ui_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_visual_qa.py --require-browser-execution --output artifacts/accurate_intake_product_pages_visual_qa_ci.json --screenshot-dir artifacts/product_pages_visual_qa_ci --timeout-ms 25000
          python scripts/build_accurate_intake_product_pages_renderer_source_map.py --output artifacts/accurate_intake_product_pages_renderer_source_map_ci.json
          python scripts/build_accurate_intake_product_pages_renderer_source_closure_gate.py --renderer-source-map-json artifacts/accurate_intake_product_pages_renderer_source_map_ci.json --output artifacts/accurate_intake_product_pages_renderer_source_closure_gate_ci.json
          python scripts/build_accurate_intake_product_pages_context_target_browser_closure.py --short-term-context-json artifacts/accurate_intake_product_pages_short_term_context_smoke_ci.json --target-candidate-json artifacts/accurate_intake_product_pages_target_candidate_ui_smoke_ci.json --output artifacts/accurate_intake_product_pages_context_target_browser_closure_ci.json

      - name: Upload product pages browser E2E report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: accurate-intake-product-pages-browser-smoke-report
          path: |
            artifacts/accurate_intake_product_pages_browser_smoke_ci.json
            artifacts/accurate_intake_product_pages_body_noplan_degraded_smoke_ci.json
            artifacts/accurate_intake_product_pages_short_term_context_smoke_ci.json
            artifacts/accurate_intake_product_pages_target_candidate_ui_smoke_ci.json
            artifacts/accurate_intake_product_pages_visual_qa_ci.json
            artifacts/accurate_intake_product_pages_renderer_source_map_ci.json
            artifacts/accurate_intake_product_pages_renderer_source_closure_gate_ci.json
            artifacts/accurate_intake_product_pages_context_target_browser_closure_ci.json
            artifacts/product_pages_browser_e2e_selection_ci.json
            artifacts/product_pages_visual_qa_ci
          if-no-files-found: error
