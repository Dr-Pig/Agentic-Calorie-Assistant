name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONUTF8: "1"

jobs:
  repo-hygiene-and-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run repo hygiene and architecture hooks
        run: pre-commit run --all-files

  pre-edd-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pre-EDD readiness gate
        run: python scripts/pre_edd_readiness.py --timeout-seconds 180

      - name: Upload pre-EDD readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-edd-readiness-report
          path: artifacts/pre_edd_readiness_report.json
          if-no-files-found: error

  runtime-contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run single-manager contract test wall
        run: |
          python -m pytest \
            tests/test_domain_first_guardrails.py \
            tests/test_manager_service.py \
            tests/test_deepseek_adapter.py \
            tests/test_builderspace_adapter.py \
            tests/test_bootstrap_semantic_ownership_guardrails.py \
            tests/test_pre_edd_readiness.py \
            tests/test_runner_timeout_contract.py \
            tests/test_tavily_timeout_contract.py \
            tests/test_text_integrity.py \
            tests/test_workflow_routing_decision.py \
            -q

  phase-c-environment-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Phase C environment policy
        run: |
          python scripts/verify_environment.py
          python -m pytest tests/test_environment_verification.py -q

      - name: Run Phase C baseline gate
        run: |
          python -m pytest \
            tests/test_environment_verification.py \
            tests/test_canonical_commit_unit_of_work_adapter.py \
            tests/test_correction_commit_uow_adapter.py \
            tests/test_correction_target_reference_state.py \
            tests/test_no_plan_ledger_policy.py \
            tests/test_budget_ledger_truth_boundary.py \
            tests/test_phase_a_current_turn_context.py \
            tests/test_phase_a_context_direction_lock.py \
            tests/test_phase_a_manager_payload_wiring.py \
            tests/test_phase_c_transaction_ports_contract.py \
            tests/test_phase_c_mutation_projection.py \
            tests/test_phase_c_same_truth_gate.py \
            tests/test_phase_a_commit_boundary_preflight.py \
            -q
          python scripts/run_wave1_founder_e2e_deterministic_diagnostic.py

      - name: Run Phase C governance gate
        run: |
          python scripts/check_layer_integrity.py
          python scripts/check_runtime_boundaries.py
          python scripts/audit_readiness_claim_integrity.py
          python scripts/audit_deterministic_semantic_ownership.py --stage zero-high-risk
          python scripts/audit_repo_legacy_surfaces.py
          lint-imports --config .importlinter
          python scripts/check_markdown_encoding.py --policy-docs --require-bom
          git diff --check

  docker-dev-environment:
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: compose.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose dev environment
        run: |
          docker compose config
          docker compose build app
          docker compose run --rm test
          docker compose run --rm app python scripts/verify_environment.py
          docker compose run --rm app python -m pytest tests/test_environment_verification.py tests/test_no_plan_ledger_policy.py -q

  accurate-intake-mvp-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Accurate Intake MVP deterministic gate
        run: |
          python scripts/verify_accurate_intake_mvp.py --python python --output artifacts/accurate_intake_mvp_gate.json

      - name: Upload Accurate Intake MVP gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-mvp-gate-report
          path: artifacts/accurate_intake_mvp_gate.json
          if-no-files-found: error

  product-pages-browser-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Run product pages browser E2E diagnostic
        run: |
          python -m pytest tests/test_accurate_intake_product_pages_browser_smoke.py tests/test_accurate_intake_product_pages_seven_day_diary_smoke.py tests/test_accurate_intake_product_pages_static.py -q
          python scripts/run_accurate_intake_product_pages_browser_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_browser_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_seven_day_diary_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_seven_day_diary_smoke_ci.json --timeout-ms 25000

      - name: Upload product pages browser E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-product-pages-browser-smoke-report
          path: |
            artifacts/accurate_intake_product_pages_browser_smoke_ci.json
            artifacts/accurate_intake_product_pages_seven_day_diary_smoke_ci.json
          if-no-files-found: error

  wave1-phase-a-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Wave 1 Phase A deterministic contracts
        shell: bash
        run: |
          set -euo pipefail
          files=(
            tests/test_wave1_phase_a_routes.py
            tests/test_wave1_phase_a2_smoke_runner.py
            tests/test_wave1_state_guard_contracts.py
            tests/test_wave1_trace_and_render_contracts.py
          )
          existing=()
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              existing+=("$file")
            else
              echo "::notice title=Wave 1 Phase A test not present::$file is not present on this ref; skipped."
            fi
          done
          if [ -f tests/test_run_suite_wave.py ] && [ -f docs/quality/AUDIT_RUNNER_REGISTRY.json ]; then
            existing+=(tests/test_run_suite_wave.py)
          elif [ -f tests/test_run_suite_wave.py ]; then
            echo "::notice title=Wave suite runner test skipped::tests/test_run_suite_wave.py needs docs/quality/AUDIT_RUNNER_REGISTRY.json, which is not present on this ref."
          fi
          if [ "${#existing[@]}" -eq 0 ]; then
            echo "No Wave 1 Phase A contract tests are present on this ref; skipping job."
            exit 0
          fi
          python -m pytest "${existing[@]}" -q

  wave1-phase-b-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Wave 1 Phase B deterministic contracts
        shell: bash
        run: |
          set -euo pipefail
          files=(
            tests/test_wave1_phase_b_minimal_tool_loop_smoke.py
            tests/test_wave1_phase_b_tool_loop_readiness.py
            tests/test_wave1_phase_b2_evidence_synthesis_readiness.py
          )
          existing=()
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              existing+=("$file")
            else
              echo "::notice title=Wave 1 Phase B test not present::$file is not present on this ref; skipped."
            fi
          done
          if [ "${#existing[@]}" -eq 0 ]; then
            echo "No Wave 1 Phase B contract tests are present on this ref; skipping job."
            exit 0
          fi
          python -m pytest "${existing[@]}" -q

  wave1-hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Wave 1 hygiene checks when present
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/check_wave1_legacy_terms.py ]; then
            python scripts/check_wave1_legacy_terms.py
          else
            echo "::notice title=Wave 1 hygiene skipped::scripts/check_wave1_legacy_terms.py is not present on this ref."
          fi
          echo "Markdown encoding policy is enforced by pre-edd-readiness."
