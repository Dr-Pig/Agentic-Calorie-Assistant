name: ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_call:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONUTF8: "1"

jobs:
  repo-hygiene-and-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run repo hygiene and architecture hooks
        run: pre-commit run --all-files

  pre-edd-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pre-EDD readiness gate
        run: python scripts/pre_edd_readiness.py --timeout-seconds 180

      - name: Upload pre-EDD readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-edd-readiness-report
          path: artifacts/pre_edd_readiness_report.json
          if-no-files-found: error

  runtime-contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run single-manager contract test wall
        run: |
          python -m pytest \
            tests/test_domain_first_guardrails.py \
            tests/test_manager_service.py \
            tests/test_deepseek_adapter.py \
            tests/test_builderspace_adapter.py \
            tests/test_bootstrap_semantic_ownership_guardrails.py \
            tests/test_long_term_context_shadow_lab_guards.py \
            tests/test_pre_edd_readiness.py \
            tests/test_runner_timeout_contract.py \
            tests/test_tavily_timeout_contract.py \
            tests/test_text_integrity.py \
            tests/test_workflow_routing_decision.py \
            -q

  phase-c-environment-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Phase C environment policy
        run: |
          python scripts/verify_environment.py
          python -m pytest tests/test_environment_verification.py -q

      - name: Run Phase C baseline gate
        run: |
          python -m pytest \
            tests/test_environment_verification.py \
            tests/test_canonical_commit_unit_of_work_adapter.py \
            tests/test_correction_commit_uow_adapter.py \
            tests/test_correction_target_reference_state.py \
            tests/test_no_plan_ledger_policy.py \
            tests/test_budget_ledger_truth_boundary.py \
            tests/test_phase_a_current_turn_context.py \
            tests/test_phase_a_context_direction_lock.py \
            tests/test_phase_a_manager_payload_wiring.py \
            tests/test_phase_c_transaction_ports_contract.py \
            tests/test_phase_c_mutation_projection.py \
            tests/test_phase_c_same_truth_gate.py \
            tests/test_phase_a_commit_boundary_preflight.py \
            -q
          python scripts/run_wave1_founder_e2e_deterministic_diagnostic.py

      - name: Run Phase C governance gate
        run: |
          python scripts/check_layer_integrity.py
          python scripts/check_runtime_boundaries.py
          python scripts/audit_readiness_claim_integrity.py
          python scripts/audit_deterministic_semantic_ownership.py --stage zero-high-risk
          python scripts/audit_repo_legacy_surfaces.py
          lint-imports --config .importlinter
          python scripts/check_markdown_encoding.py --policy-docs --require-bom
          git diff --check

  docker-dev-environment:
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: compose.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose dev environment
        run: |
          docker compose config
          docker compose build app
          docker compose run --rm test
          docker compose run --rm app python scripts/verify_environment.py
          docker compose run --rm app python -m pytest tests/test_environment_verification.py tests/test_no_plan_ledger_policy.py -q

  accurate-intake-mvp-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Accurate Intake MVP deterministic gate
        run: |
          python scripts/verify_accurate_intake_mvp.py --python python --output artifacts/accurate_intake_mvp_gate.json

      - name: Run PL+CE context-conditioned intent wall
        run: |
          python -m pytest tests/test_accurate_intake_context_conditioned_intent_wall.py -q
          python scripts/run_accurate_intake_context_conditioned_intent_wall.py --output artifacts/accurate_intake_context_conditioned_intent_wall_ci.json

      - name: Run PL+CE correction/removal fixture flow
        run: |
          python -m pytest tests/test_accurate_intake_correction_removal_fixture_flow.py -q
          python scripts/run_accurate_intake_correction_removal_fixture_flow.py --output artifacts/accurate_intake_correction_removal_fixture_flow_ci.json

      - name: Run PL+CE responder input contract fake smoke
        run: |
          python -m pytest tests/test_accurate_intake_responder_input_contract_fake_smoke.py -q
          python scripts/run_accurate_intake_responder_input_contract_fake_smoke.py --output artifacts/accurate_intake_responder_input_contract_fake_smoke_ci.json

      - name: Run PL+CE local MVP candidate bundle
        run: |
          python scripts/build_accurate_intake_ui_same_truth_render_contract.py --output artifacts/accurate_intake_ui_same_truth_render_contract_ci.json
          python scripts/run_accurate_intake_short_term_context_runtime_replay.py --output artifacts/accurate_intake_short_term_context_runtime_replay_ci.json
          python scripts/run_accurate_intake_fake_provider_context_smoke.py --output artifacts/accurate_intake_fake_provider_context_smoke_ci.json
          python scripts/build_accurate_intake_context_quality_pack.py --output artifacts/accurate_intake_context_quality_pack_ci.json
          python scripts/build_accurate_intake_fixture_evidence_packet_emulator.py --output artifacts/accurate_intake_fixture_evidence_packet_emulator_ci.json
          python scripts/run_accurate_intake_fake_provider_tool_loop_smoke.py --output artifacts/accurate_intake_fake_provider_tool_loop_smoke_ci.json
          python scripts/build_accurate_intake_review_eval_candidate_pipeline.py --output artifacts/accurate_intake_review_eval_candidate_pipeline_ci.json
          python -c "from pathlib import Path; p=Path('artifacts/plce_candidate_fixture_smoke.sqlite3'); p.parent.mkdir(parents=True, exist_ok=True); p.touch()"
          python scripts/build_accurate_intake_local_operator_data_hygiene_bundle.py --db-path artifacts/plce_candidate_fixture_smoke.sqlite3 --output artifacts/accurate_intake_local_operator_data_hygiene_bundle_ci.json
          python -m pytest tests/test_accurate_intake_pl_ce_context_coverage_matrix.py -q
          python scripts/build_accurate_intake_pl_ce_context_coverage_matrix.py \
            --artifact context_conditioned_intent_wall=artifacts/accurate_intake_context_conditioned_intent_wall_ci.json \
            --artifact short_term_context_runtime_replay=artifacts/accurate_intake_short_term_context_runtime_replay_ci.json \
            --artifact fake_provider_context_smoke=artifacts/accurate_intake_fake_provider_context_smoke_ci.json \
            --artifact context_quality_pack=artifacts/accurate_intake_context_quality_pack_ci.json \
            --output artifacts/accurate_intake_pl_ce_context_coverage_matrix_ci.json
          python -m pytest tests/test_accurate_intake_pl_ce_local_mvp_candidate_bundle.py -q
          python scripts/build_accurate_intake_pl_ce_local_mvp_candidate_bundle.py \
            --artifact ui_same_truth_contract=artifacts/accurate_intake_ui_same_truth_render_contract_ci.json \
            --artifact context_quality_pack=artifacts/accurate_intake_context_quality_pack_ci.json \
            --artifact short_term_context_runtime_replay=artifacts/accurate_intake_short_term_context_runtime_replay_ci.json \
            --artifact context_coverage_matrix=artifacts/accurate_intake_pl_ce_context_coverage_matrix_ci.json \
            --artifact context_conditioned_intent_wall=artifacts/accurate_intake_context_conditioned_intent_wall_ci.json \
            --artifact correction_removal_fixture_flow=artifacts/accurate_intake_correction_removal_fixture_flow_ci.json \
            --artifact responder_input_contract_fake_smoke=artifacts/accurate_intake_responder_input_contract_fake_smoke_ci.json \
            --artifact fixture_packet_emulator=artifacts/accurate_intake_fixture_evidence_packet_emulator_ci.json \
            --artifact fake_provider_tool_loop_smoke=artifacts/accurate_intake_fake_provider_tool_loop_smoke_ci.json \
            --artifact review_eval_candidate_pipeline=artifacts/accurate_intake_review_eval_candidate_pipeline_ci.json \
            --artifact local_operator_data_hygiene_bundle=artifacts/accurate_intake_local_operator_data_hygiene_bundle_ci.json \
            --artifact mvp_gate_summary=artifacts/accurate_intake_mvp_gate.json \
            --output artifacts/accurate_intake_pl_ce_local_mvp_candidate_bundle_ci.json

      - name: Upload Accurate Intake MVP gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-mvp-gate-report
          path: artifacts/accurate_intake_mvp_gate.json
          if-no-files-found: error

      - name: Upload PL+CE context-conditioned intent wall report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-context-conditioned-intent-wall-report
          path: artifacts/accurate_intake_context_conditioned_intent_wall_ci.json
          if-no-files-found: error

      - name: Upload PL+CE correction/removal fixture flow report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-correction-removal-fixture-flow-report
          path: artifacts/accurate_intake_correction_removal_fixture_flow_ci.json
          if-no-files-found: error

      - name: Upload PL+CE responder input contract fake smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-responder-input-contract-fake-smoke-report
          path: artifacts/accurate_intake_responder_input_contract_fake_smoke_ci.json
          if-no-files-found: error

      - name: Upload PL+CE local MVP candidate bundle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accurate-intake-pl-ce-local-mvp-candidate-bundle-report
          path: |
            artifacts/accurate_intake_pl_ce_local_mvp_candidate_bundle_ci.json
            artifacts/accurate_intake_ui_same_truth_render_contract_ci.json
            artifacts/accurate_intake_short_term_context_runtime_replay_ci.json
            artifacts/accurate_intake_fake_provider_context_smoke_ci.json
            artifacts/accurate_intake_context_quality_pack_ci.json
            artifacts/accurate_intake_pl_ce_context_coverage_matrix_ci.json
            artifacts/accurate_intake_fixture_evidence_packet_emulator_ci.json
            artifacts/accurate_intake_fake_provider_tool_loop_smoke_ci.json
            artifacts/accurate_intake_review_eval_candidate_pipeline_ci.json
            artifacts/accurate_intake_local_operator_data_hygiene_bundle_ci.json
          if-no-files-found: error

  product-pages-browser-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Run product pages browser E2E diagnostic
        run: |
          python -m pytest tests/test_accurate_intake_product_pages_renderer_source_map.py tests/test_accurate_intake_product_pages_browser_smoke.py tests/test_accurate_intake_product_pages_seven_day_diary_smoke.py tests/test_accurate_intake_product_pages_short_term_context_smoke.py tests/test_accurate_intake_product_pages_visual_qa.py tests/test_accurate_intake_product_pages_static.py tests/test_accurate_intake_static_cjk_copy_integrity.py tests/test_accurate_intake_pl_ce_ui_context_alignment_pack.py tests/test_accurate_intake_pl_ce_browser_activation_evidence_gate.py tests/test_accurate_intake_pl_ce_activation_review_manifest.py tests/test_accurate_intake_pl_ce_serial_handoff.py -q
          python scripts/run_accurate_intake_product_pages_browser_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_browser_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_seven_day_diary_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_seven_day_diary_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_short_term_context_smoke.py --require-browser-execution --output artifacts/accurate_intake_product_pages_short_term_context_smoke_ci.json --timeout-ms 25000
          python scripts/run_accurate_intake_product_pages_visual_qa.py --require-browser-execution --output artifacts/accurate_intake_product_pages_visual_qa_ci.json --screenshot-dir artifacts/product_pages_visual_qa_ci --timeout-ms 25000
          python scripts/build_accurate_intake_product_pages_renderer_source_map.py --output artifacts/accurate_intake_product_pages_renderer_source_map_ci.json
          python scripts/verify_accurate_intake_mvp.py --python python --output artifacts/accurate_intake_mvp_gate.json
          python scripts/build_accurate_intake_ui_same_truth_render_contract.py --output artifacts/accurate_intake_ui_same_truth_render_contract_ci.json
          python scripts/run_accurate_intake_short_term_context_runtime_replay.py --output artifacts/accurate_intake_short_term_context_runtime_replay_ci.json
          python scripts/run_accurate_intake_fake_provider_context_smoke.py --output artifacts/accurate_intake_fake_provider_context_smoke_ci.json
          python scripts/build_accurate_intake_context_quality_pack.py --output artifacts/accurate_intake_context_quality_pack_ci.json
          python scripts/run_accurate_intake_context_conditioned_intent_wall.py --output artifacts/accurate_intake_context_conditioned_intent_wall_ci.json
          python scripts/run_accurate_intake_correction_removal_fixture_flow.py --output artifacts/accurate_intake_correction_removal_fixture_flow_ci.json
          python scripts/run_accurate_intake_responder_input_contract_fake_smoke.py --output artifacts/accurate_intake_responder_input_contract_fake_smoke_ci.json
          python scripts/build_accurate_intake_fixture_evidence_packet_emulator.py --output artifacts/accurate_intake_fixture_evidence_packet_emulator_ci.json
          python scripts/run_accurate_intake_fake_provider_tool_loop_smoke.py --output artifacts/accurate_intake_fake_provider_tool_loop_smoke_ci.json
          python scripts/build_accurate_intake_review_eval_candidate_pipeline.py --output artifacts/accurate_intake_review_eval_candidate_pipeline_ci.json
          python -c "from pathlib import Path; p=Path('artifacts/plce_candidate_fixture_smoke.sqlite3'); p.parent.mkdir(parents=True, exist_ok=True); p.touch()"
          python scripts/build_accurate_intake_local_operator_data_hygiene_bundle.py --db-path artifacts/plce_candidate_fixture_smoke.sqlite3 --output artifacts/accurate_intake_local_operator_data_hygiene_bundle_ci.json
          python scripts/build_accurate_intake_pl_ce_context_coverage_matrix.py \
            --artifact context_conditioned_intent_wall=artifacts/accurate_intake_context_conditioned_intent_wall_ci.json \
            --artifact short_term_context_runtime_replay=artifacts/accurate_intake_short_term_context_runtime_replay_ci.json \
            --artifact fake_provider_context_smoke=artifacts/accurate_intake_fake_provider_context_smoke_ci.json \
            --artifact context_quality_pack=artifacts/accurate_intake_context_quality_pack_ci.json \
            --output artifacts/accurate_intake_pl_ce_context_coverage_matrix_ci.json
          python scripts/build_accurate_intake_pl_ce_ui_context_alignment_pack.py \
            --artifact ui_same_truth_contract=artifacts/accurate_intake_ui_same_truth_render_contract_ci.json \
            --artifact product_pages_renderer_source_map=artifacts/accurate_intake_product_pages_renderer_source_map_ci.json \
            --artifact context_coverage_matrix=artifacts/accurate_intake_pl_ce_context_coverage_matrix_ci.json \
            --artifact product_pages_browser_smoke=artifacts/accurate_intake_product_pages_browser_smoke_ci.json \
            --artifact product_pages_seven_day_diary_smoke=artifacts/accurate_intake_product_pages_seven_day_diary_smoke_ci.json \
            --artifact product_pages_short_term_context_smoke=artifacts/accurate_intake_product_pages_short_term_context_smoke_ci.json \
            --artifact product_pages_visual_qa=artifacts/accurate_intake_product_pages_visual_qa_ci.json \
            --output artifacts/accurate_intake_pl_ce_ui_context_alignment_pack_ci.json
          python scripts/build_accurate_intake_pl_ce_local_mvp_candidate_bundle.py \
            --artifact ui_same_truth_contract=artifacts/accurate_intake_ui_same_truth_render_contract_ci.json \
            --artifact context_quality_pack=artifacts/accurate_intake_context_quality_pack_ci.json \
            --artifact short_term_context_runtime_replay=artifacts/accurate_intake_short_term_context_runtime_replay_ci.json \
            --artifact context_coverage_matrix=artifacts/accurate_intake_pl_ce_context_coverage_matrix_ci.json \
            --artifact context_conditioned_intent_wall=artifacts/accurate_intake_context_conditioned_intent_wall_ci.json \
            --artifact correction_removal_fixture_flow=artifacts/accurate_intake_correction_removal_fixture_flow_ci.json \
            --artifact responder_input_contract_fake_smoke=artifacts/accurate_intake_responder_input_contract_fake_smoke_ci.json \
            --artifact fixture_packet_emulator=artifacts/accurate_intake_fixture_evidence_packet_emulator_ci.json \
            --artifact fake_provider_tool_loop_smoke=artifacts/accurate_intake_fake_provider_tool_loop_smoke_ci.json \
