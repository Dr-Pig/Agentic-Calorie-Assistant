name: wave1-runtime-smoke

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "B-1 runtime smoke mode"
        required: true
        default: "forced"
        type: choice
        options:
          - forced
          - natural-probe
      provider_timeout_ms:
        description: "Per-provider-call timeout in milliseconds"
        required: true
        default: "240000"
      continue_on_expected_red:
        description: "Keep workflow green when verifier reports an expected red artifact, such as natural-probe selection gaps"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONUTF8: "1"

jobs:
  wave1-runtime-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Wave 1 B-1 runtime smoke artifact
        run: |
          python scripts/run_wave1_phase_b_minimal_tool_loop_smoke.py \
            --mode "${{ inputs.mode }}" \
            --provider-timeout-ms "${{ inputs.provider_timeout_ms }}"

      - name: Verify Wave 1 B-1 runtime smoke artifact
        id: verify
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/verify_wave1_phase_b_tool_loop_readiness.py \
            --phase-b-report artifacts/wave1_phase_b_minimal_tool_loop_smoke.json \
            | tee artifacts/wave1_runtime_smoke_verify_stdout.json

      - name: Classify verifier result
        shell: bash
        run: |
          if [ "${{ steps.verify.outcome }}" = "success" ]; then
            echo "Verifier passed."
            exit 0
          fi

          if [ "${{ inputs.continue_on_expected_red }}" = "true" ]; then
            echo "::warning title=Wave 1 runtime smoke expected red::Verifier failed. Artifact is uploaded for review. This is allowed because continue_on_expected_red=true."
            exit 0
          fi

          echo "::error title=Wave 1 runtime smoke failed::Verifier failed and continue_on_expected_red=false."
          exit 1

      - name: Upload Wave 1 runtime smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave1-runtime-smoke-${{ inputs.mode }}
          path: |
            artifacts/wave1_phase_b_minimal_tool_loop_smoke*.json
            artifacts/wave1_phase_b_minimal_tool_loop_readiness*.json
            artifacts/wave1_runtime_smoke_verify_stdout.json
          if-no-files-found: warn
