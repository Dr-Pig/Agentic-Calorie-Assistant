name: ci

on:
  push:
  pull_request:

jobs:
  layer-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute diff range
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DIFF_BASE_SHA=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"
            echo "DIFF_HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          else
            echo "DIFF_BASE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "DIFF_HEAD_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Run diff scope check
        run: python scripts/check_git_diff_scope.py --range "$DIFF_BASE_SHA" "$DIFF_HEAD_SHA"

      - name: Run commit format check
        run: python scripts/check_commit_format.py --range "$DIFF_BASE_SHA" "$DIFF_HEAD_SHA"

      - name: Run layer integrity check
        run: python scripts/check_layer_integrity.py

      - name: Run runtime boundary check
        run: python scripts/check_runtime_boundaries.py

      - name: Run diff-scoped ruff
        run: python scripts/check_git_diff_scope.py --range "$DIFF_BASE_SHA" "$DIFF_HEAD_SHA" --run-ruff

      - name: Run protected doc rewrite audit
        shell: pwsh
        run: ./scripts/check_protected_doc_rewrites.ps1

      - name: Run encoding policy audit
        shell: pwsh
        run: ./scripts/check_encoding.ps1 -AuditDocsPolicy

      - name: Run fat-file governance audit
        shell: pwsh
        run: ./scripts/check_fat_files.ps1 -AuditAll -NoFailOnWarnings

      - name: Run migration discipline check
        run: python scripts/check_migration_discipline.py

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        run: python -m pytest -q -m smoke

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: python -m pytest -q -m integration
