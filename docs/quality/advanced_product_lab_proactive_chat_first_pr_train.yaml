capability_dependency_check:
  capability_layer: L9 Same-Truth / UI / Memory / Proactive with L1-L8 runtime dependencies
  upstream_dependencies:
    - layer: L0 Product Operating Rules
      contract_status: tested
      risk_if_missing: proactive could become notification-first or shame/directive copy.
    - layer: L1 InteractionEvent / CurrentTurnContext
      contract_status: tested
      risk_if_missing: wake events and control events could bypass manager-style context.
    - layer: L2 AttachmentDecision / TransitionGuardResult
      contract_status: contract_backed
      risk_if_missing: dismiss, snooze, reopen, and downstream handoff can attach to the wrong candidate.
    - layer: L3 MealThread / Draft / Commit Boundary
      contract_status: tested
      risk_if_missing: proactive follow-up could imply intake mutation without explicit user action.
    - layer: L4 RetrievalIntent / Source Selection
      contract_status: tested
      risk_if_missing: recommendation and memory candidates can over-read transcript or stale source refs.
    - layer: L8 Mutation / Ledger / Version
      contract_status: draft
      risk_if_missing: proactive could mutate budget, rescue, recommendation, or memory truth directly.
  slice_mode:
    - contract_guard
    - eval
    - lab_only_runtime
    - offline_runtime
  user_facing_behavior_changed: false
  runtime_truth_changed: false
  mutation_changed: false
  safe_to_proceed_now: true
  why_not_local_next_step_trap: >
    Proactive is downstream of memory, rescue, recommendation, and context engineering.
    Starting with the entry contract prevents a separate scheduler or notification
    architecture from becoming the product skeleton.

branch_strategy:
  target_branch: codex/advanced-product-lab
  stable_repo_branches:
    - main
    - codex/advanced-product-lab
  logical_pr_slices_run_on_same_branch: true
  lab_runtime_surface_may_be_complete: true
  lab_user_facing_surfaces_allowed: true
  lab_scheduler_simulation_allowed: true
  mainline_activation_enabled: false
  self_use_v1_affected: false
  keep_long_lived_lab_branch: true
  short_lived_pr_branches_required: false

required_artifact_flags:
  lab_enabled: true
  lab_isolated: true
  lab_chat_delivery_allowed: true
  lab_scheduler_simulation_allowed: true
  lab_control_state_loop_allowed: true
  mainline_activation_enabled: false
  mainline_runtime_connected: false
  served_to_mainline_user: false
  production_notification_delivery_allowed: false
  production_scheduler_delivery_allowed: false
  production_route_or_api_mount_allowed: false
  production_db_migration_allowed: false
  canonical_product_mutation_allowed_on_main: false
  durable_product_memory_activation_on_main: false
  manager_context_packet_changed: false

proactive_ladder:
  wake_to_delivery_order:
    - deterministic_trigger_gate
    - contextual_send_skip_decision
    - lab_chat_first_delivery
    - control_feedback_projection
  autonomy_tier_order:
    - observe_only
    - draft
    - suggest
    - ask_to_approve
    - lab_chat_deliver_with_controls
  production_push_allowed: false
  lab_chat_delivery_is_user_facing_inside_lab: true
  every_candidate_requires:
    - wake_source
    - user_relevant_reason
    - permission_posture
    - interrupt_cost
    - dismiss_path
    - snooze_window
    - reopen_or_modify_path
    - next_signal_required
    - suppression_trace

manager_tool_entry:
  tool_name: proactive.run
  capability_id: proactive
  tool_mode: wake_candidate_context
  runtime_surface: manager_tool_loop
  parallel_orchestration_allowed: false
  upstream_truth_contract_family: CurrentShell_ManagerRuntime

dependency_status:
  memory: completed
  context_engineering: completed
  rescue_phase1: completed
  recommendation: completed

best_practice_evidence:
  required: true
  sources_checked:
    - official_or_primary_source: https://platform.openai.com/docs/guides/trace-grading
      adopted_guidance: use trace evidence to identify tool, guard, and workflow failures rather than black-box output only.
    - official_or_primary_source: https://platform.openai.com/docs/guides/evaluation-best-practices
      adopted_guidance: use objective-specific eval sets with edge cases, holdouts, and continuous growth.
    - official_or_primary_source: https://platform.openai.com/docs/guides/agent-evals
      adopted_guidance: evaluate tool choice, argument precision, data precision, and handoff accuracy.
    - official_or_primary_source: https://openai.github.io/openai-agents-python/guardrails/
      adopted_guidance: keep side-effect-sensitive validation at guard/tool boundaries.
  rejected_guidance:
    - notification_first_scheduler_as_product_core
    - generic_workflow_engine_before_multiple_real_consumers
    - user_facing_control_copy_using_undo_instead_of_reopen_or_modify
  conflict_with_repo_habits: >
    Earlier proactive artifacts were no-send first. The lab branch may now build
    full chat-first lab delivery, but production notification and mainline activation
    remain blocked.
  how_the_design_changed: >
    The train starts from wake/control/chat-first entry gates and then moves through
    deterministic gates, LLM send/skip, lab delivery, feedback projection, E2E, live
    diagnostics, and dormancy.

llm_deterministic_boundary:
  decision_surface: proactive_chat_first_runtime
  truth_owner: hybrid
  deterministic_role:
    - validate_wake_source
    - enforce_cooldown
    - enforce_quiet_hours
    - enforce_permission_posture
    - enforce_control_state
    - block_illegal_mutation
    - compile_omission_trace
  llm_role:
    - decide_contextual_send_or_skip_after_gate
    - synthesize_chat_first_copy
    - explain_why_now
  do_not_override:
    - current_budget_view
    - active_body_plan_view
    - MealThread_truth
    - recommendation_offer_truth
    - rescue_proposal_truth
    - reviewed_memory_record_truth

semantic_owner:
