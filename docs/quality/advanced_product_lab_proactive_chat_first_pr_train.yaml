  wake_legality: ProactiveDeterministicGate
  routing_or_workflow_effect: shared_manager_turn_plan_contract
  copy_and_contextual_send_skip: ManagerRuntime_LLM
  mutation_legality: deterministic_guards_and_canonical_mutation_layers
  persistence_truth: proactive_control_state_projection_and_canonical_product_objects

