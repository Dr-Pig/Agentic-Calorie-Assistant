pr_train:
  - pr_number: 1
    slice_id: proactive_entry_contract_from_memory_rescue_recommendation_outputs
    goal: Open proactive train from completed memory, rescue, context engineering, and recommendation outputs.
  - pr_number: 2
    slice_id: proactive_tool_argument_contract
    goal: Define proactive.run manager tool arguments, scope keys, wake source refs, and no raw transcript bypass.
  - pr_number: 3
    slice_id: proactive_golden_set_loader_and_width_gate
    goal: Add executable loader/schema and semantic-width gate for proactive golden set.
  - pr_number: 4
    slice_id: deterministic_trigger_gate_core
    goal: Implement cooldown, quiet hours, recent-send cap, onboarding, permission, and data sufficiency gate.
  - pr_number: 5
    slice_id: proactive_control_state_store
    goal: Add lab-isolated dismiss, snooze, opt-out, reopen-or-modify, and next-signal control state.
  - pr_number: 6
    slice_id: wake_source_adapters
    goal: Read memory, rescue, recommendation, and pending-meal outputs as proactive wake candidates.
  - pr_number: 7
    slice_id: no_send_candidate_and_lab_delivery_candidate_trace
    goal: Produce auditable candidates before any chat delivery or notification surface.
  - pr_number: 8
    slice_id: contextual_send_skip_fixture_provider
    goal: Add LLM-owned send/skip fixture provider and validator.
  - pr_number: 9
    slice_id: contextual_send_skip_grokfast_live_diagnostic
    goal: Run Grokfast live diagnostic for send/skip decisions and copy posture.
  - pr_number: 10
    slice_id: lab_chat_first_delivery_packet
    goal: Build lab chat delivery packet with controls and dashboard mirror fields.
  - pr_number: 11
    slice_id: recommendation_proactive_integration
    goal: Convert recommendation outputs into proactive candidates without serving production notifications.
  - pr_number: 12
    slice_id: rescue_proactive_integration
    goal: Convert rescue outputs into proactive candidates with suppression and rescue legality boundaries.
  - pr_number: 13
    slice_id: pending_meal_followup_integration
    goal: Handle pending meal follow-up wakes without creating MealThread or ledger mutation.
  - pr_number: 14
    slice_id: feedback_event_projection_and_suppression
    goal: Project dismiss, snooze, opt-out, and reopen-or-modify into control state and memory candidates through validators.
  - pr_number: 15
    slice_id: quiet_hours_cooldown_holdouts
    goal: Add negative and false-positive holdouts for silence, cooldown, and next-signal behavior.
  - pr_number: 16
    slice_id: adversarial_overtrigger_undertrigger_pack
    goal: Cover noisy, stale, prompt-injected, and low-value proactive candidates.
  - pr_number: 17
    slice_id: proactive_dashboard_mirror_read_model
    goal: Mirror lab proactive status and controls without UI-owned truth or mutation.
  - pr_number: 18
    slice_id: recommendation_to_proactive_to_feedback_e2e
    goal: Exercise recommendation candidate to proactive chat delivery to feedback suppression.
  - pr_number: 19
    slice_id: rescue_to_proactive_suppression_e2e
    goal: Exercise rescue nudge candidate, dismiss/snooze, and rescue-proactive suppression.
  - pr_number: 20
    slice_id: proactive_feedback_grokfast_live_diagnostic
    goal: Run Grokfast live diagnostic for feedback interpretation and copy repair.
  - pr_number: 21
    slice_id: paired_lab_e2e_and_shadow_comparison
    goal: Compare baseline manager, candidate-only, and lab-chat-delivery paths.
  - pr_number: 22
    slice_id: latency_cost_omission_trace
    goal: Record latency, provider cost posture, degraded omission, and no retry-expansion behavior.
  - pr_number: 23
    slice_id: mainline_dormancy_gate
    goal: Prove merge-back keeps production route, scheduler, notification, DB migration, and durable activation dormant.
  - pr_number: 24
    slice_id: quality_closeout_and_next_capability_plan
    goal: Aggregate fixture, holdout, live, E2E, and dormancy evidence and decide next activation or dogfood path.

