pr_train:
  - pr_number: 1
    slice_id: context_engineering_bootstrap_and_train_alignment
    goal: Record the 29-PR train, branch policy, manager-style convergence rule, and reusable-meal boundary in canonical bootstrap/spec artifacts.
    slice_mode:
      - contract_guard
      - wrapper_evidence_wiring
    merge_target: codex/advanced-product-lab
    completion_gate: AGENTS/bootstrap, memory build spec, and machine-readable train align without changing runtime code.
  - pr_number: 2
    slice_id: shared_manager_style_convergence_contract
    goal: Define the shared manager-style convergence contract across Current Shell and advanced lab.
    slice_mode:
      - contract_guard
      - runtime_contract
    merge_target: codex/advanced-product-lab
    completion_gate: one orchestration stance and one truth-owner map are machine-readable and test-backed.
  - pr_number: 3
    slice_id: shared_capability_registry_contract
    goal: Add shared capability family and tool-vocabulary registry for intake, query, memory, rescue, recommendation, proactive, and reusable meal.
    slice_mode:
      - contract_guard
      - capability_registry
    merge_target: codex/advanced-product-lab
    completion_gate: capability names, tool modes, and family ownership are normalized.
  - pr_number: 4
    slice_id: manager_turn_plan_schema
    goal: Add typed ManagerTurnPlan and FinalResponsePlan contracts for multi-intent capability planning.
    slice_mode:
      - contract_guard
      - runtime_contract
    merge_target: codex/advanced-product-lab
    completion_gate: planner output no longer depends on ad hoc fixture script shape.
  - pr_number: 5
    slice_id: multi_intent_golden_set_schema_and_loader
    goal: Add product-wide multi-intent context-engineering golden set schema and loader.
    slice_mode:
      - eval
      - contract_guard
    merge_target: codex/advanced-product-lab
    completion_gate: one-turn overlap cases are representable without runner-inferred semantics.
  - pr_number: 6
    slice_id: current_shell_and_advanced_lab_overlap_case_pack
    goal: Seed overlap cases spanning intake, query, memory, rescue, and recommendation posture.
    slice_mode:
      - eval
      - holdout
    merge_target: codex/advanced-product-lab
    completion_gate: overlap cases cover both branches without creating separate routing taxonomies.
  - pr_number: 7
    slice_id: ambiguity_holdout_and_adversarial_case_pack
    goal: Add ambiguity, prompt-injection, omission, and over-trigger holdouts for shared planner behavior.
    slice_mode:
      - eval
      - security_holdout
    merge_target: codex/advanced-product-lab
    completion_gate: lexical shortcuts and transcript-driven semantic routing are caught.
  - pr_number: 8
    slice_id: trace_grader_and_omission_rubric
    goal: Add trace grading and omission/defer/block rubric for planner and tool-loop evidence.
    slice_mode:
      - eval
      - quality_report
    merge_target: codex/advanced-product-lab
    completion_gate: planner quality is scored on outcome and trace evidence rather than fixed tool order only.
  - pr_number: 9
    slice_id: bounded_react_loop_state_contract
    goal: Define bounded ReAct loop state, stop conditions, and pass/round constraints shared by the lab and Current Shell.
    slice_mode:
      - runtime_contract
      - contract_guard
    merge_target: codex/advanced-product-lab
    completion_gate: pass1/pass2 remains legal as a harness subset but not the only runtime shape.
  - pr_number: 10
    slice_id: tool_choice_ordering_and_argument_walls
    goal: Add deterministic walls for tool availability, ordering, arguments, omission, and illegal same-turn combinations.
    slice_mode:
      - runtime_contract
      - contract_guard
    merge_target: codex/advanced-product-lab
    completion_gate: multi-capability turns cannot bypass legality or hide blocked tools.
  - pr_number: 11
    slice_id: context_pack_assembler_base
    goal: Build the shared capability context-pack assembler base.
    slice_mode:
      - runtime_contract
      - context_packing
    merge_target: codex/advanced-product-lab
    completion_gate: per-capability context selection is explicit and typed.
  - pr_number: 12
    slice_id: memory_context_pack_adapter
    goal: Attach long-term memory and recall summaries to the shared context-pack assembler.
    slice_mode:
      - runtime_contract
      - memory
    merge_target: codex/advanced-product-lab
    completion_gate: memory is consumed as typed context, not transcript replay.
  - pr_number: 13
    slice_id: rescue_context_pack_adapter
    goal: Attach rescue read models, current budget, body plan, and open-proposal context to the shared assembler.
    slice_mode:
      - runtime_contract
      - rescue
    merge_target: codex/advanced-product-lab
    completion_gate: rescue context no longer relies on direct sidecar-only runtime wiring.
  - pr_number: 14
    slice_id: current_shell_runtime_bridge_contract
    goal: Define the bridge from Current Shell manager runtime traces into the shared planner vocabulary.
    slice_mode:
      - runtime_contract
      - bridge
    merge_target: codex/advanced-product-lab
    completion_gate: Current Shell can map into the same capability-plan vocabulary without activation drift.
  - pr_number: 15
    slice_id: advanced_lab_runtime_bridge_contract
    goal: Define the bridge from advanced product-lab runtime surfaces into the shared planner vocabulary.
    slice_mode:
      - runtime_contract
      - bridge
    merge_target: codex/advanced-product-lab
    completion_gate: advanced lab direct runtime builders expose the same planner seams as Current Shell.
  - pr_number: 16
    slice_id: manager_tool_result_envelope_normalization
    goal: Normalize tool-result envelopes, blockers, and source refs across manager-callable capability tools.
    slice_mode:
      - runtime_contract
      - tool_envelope
    merge_target: codex/advanced-product-lab
    completion_gate: tool outputs are composable without per-tool special casing in the manager loop.
  - pr_number: 17
    slice_id: final_response_plan_and_capability_signal_packet
    goal: Add final response planning packet and user-visible capability signal contract.
    slice_mode:
      - runtime_contract
      - chat_first
    merge_target: codex/advanced-product-lab
    completion_gate: users can tell what the system is doing without seeing internal tool names.
  - pr_number: 18
    slice_id: direct_bypass_to_manager_path_convergence
    goal: Converge advanced-lab default runtime path away from direct capability bypass toward shared manager planning.
    slice_mode:
      - runtime_contract
      - convergence
    merge_target: codex/advanced-product-lab
    completion_gate: manager path becomes the default integration path and direct builders become subordinate internals.
  - pr_number: 19
    slice_id: memory_run_on_shared_turn_plan
    goal: Run long-term memory retrieval and recall through the shared turn plan.
    slice_mode:
      - product_capability
      - memory
    merge_target: codex/advanced-product-lab
    completion_gate: memory tools are triggered by planner semantics, not fixture-only call sequences.
  - pr_number: 20
    slice_id: rescue_run_on_shared_turn_plan
    goal: Run rescue triggering, negotiation, and proposal shaping through the shared turn plan.
    slice_mode:
      - product_capability
      - rescue
    merge_target: codex/advanced-product-lab
    completion_gate: rescue becomes a planner-managed capability inside the shared ReAct loop.
  - pr_number: 21
    slice_id: reusable_meal_entity_contract
    goal: Add UserFoodEntity or RecurringMealTemplate contract as a shared product object, not memory-only truth.
    slice_mode:
      - contract_guard
      - product_capability
    merge_target: codex/advanced-product-lab
    completion_gate: repeated meals have a typed truth object with scope, provenance, and version seams.
  - pr_number: 22
    slice_id: reusable_meal_promotion_and_drift_policy
    goal: Add promotion, reuse, downgrade, supersede, and drift policy for reusable-meal candidates.
    slice_mode:
      - product_capability
      - policy
    merge_target: codex/advanced-product-lab
    completion_gate: same-as-before reuse is explicit and bounded rather than hidden cache reuse.
  - pr_number: 23
    slice_id: reusable_meal_golden_set_and_holdouts
    goal: Add reusable-meal golden set, holdouts, and false-match coverage.
    slice_mode:
      - eval
      - holdout
    merge_target: codex/advanced-product-lab
    completion_gate: similar but not identical meals do not collapse into one template.
  - pr_number: 24
    slice_id: reusable_meal_memory_hint_bridge
    goal: Bridge repeated-pattern memory hints into reusable-meal candidate retrieval without making memory the truth owner.
    slice_mode:
      - product_capability
      - memory
    merge_target: codex/advanced-product-lab
    completion_gate: memory can suggest reusable meals but cannot silently assert nutrition truth.
  - pr_number: 25
    slice_id: reusable_meal_intake_shadow_retrieval
    goal: Attach reusable-meal candidate retrieval to intake-side shadow runtime and typed context packs.
    slice_mode:
      - product_capability
      - intake
    merge_target: codex/advanced-product-lab
    completion_gate: intake can reuse prior stable meals with downgrade-to-reestimate safety.
  - pr_number: 26
    slice_id: integrated_memory_rescue_reusable_meal_fixture_e2e
    goal: Run integrated fixture E2E across planner, memory, rescue, and reusable-meal retrieval.
    slice_mode:
      - e2e
      - product_capability
    merge_target: codex/advanced-product-lab
    completion_gate: multi-capability behavior stays coherent inside one loop.
  - pr_number: 27
    slice_id: grokfast_manager_turn_live_diagnostic
    goal: Run Grokfast live diagnostic over shared planner turns, not just isolated domain nodes.
    slice_mode:
      - live_diagnostic
      - eval
    merge_target: codex/advanced-product-lab
    completion_gate: live evidence shows planner, tools, and response synthesis interact correctly.
  - pr_number: 28
    slice_id: context_engineering_shadow_comparison_and_decision_pack
    goal: Compare baseline and shared-planner paths, then produce decision pack and readiness report.
    slice_mode:
      - quality_report
      - decision_unlock
    merge_target: codex/advanced-product-lab
    completion_gate: remaining planner gaps are explicit before recommendation starts.
  - pr_number: 29
    slice_id: recommendation_entry_contract_and_next_train_closeout
    goal: Close the pre-recommendation train and record the next recommendation train starting from the shared planner skeleton.
    slice_mode:
      - closure
      - contract_guard
    merge_target: codex/advanced-product-lab
    completion_gate: recommendation begins from the shared manager/runtime contract rather than from a parallel architecture.

