      first_pr: 2
      test_signal: current-shell and advanced-lab share one manager orchestration stance.
    - coverage_id: multi_intent_context_engineering_golden_set
      source_refs:
        - docs/quality/ACCURATE_INTAKE_MVP_UX_SEMANTIC_CASES.md
        - docs/specs/L4C_CONTEXT_PACKING_SPEC.md
      first_pr: 5
      test_signal: one turn may trigger intake, rescue, recommendation, query, and memory without semantic rewrite.
    - coverage_id: omission_and_tool_ordering_trace
      source_refs:
        - docs/quality/MANAGER_RUNTIME_GATE_LEDGER.yaml
        - docs/specs/WAVE_1_PHASE_B_MINIMAL_TOOL_LOOP_SPEC.md
      first_pr: 10
      test_signal: blocked, omitted, deferred, and allowed tool paths remain visible in trace.
    - coverage_id: memory_and_rescue_on_shared_turn_plan
      source_refs:
        - docs/quality/ADVANCED_MEMORY_MECHANISM_BUILD_SPEC.md
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md
      first_pr: 19
      test_signal: memory and rescue consume a shared turn plan rather than sidecar-only direct runtime bypass.
    - coverage_id: reusable_meal_entity_not_memory_only
      source_refs:
        - docs/quality/ADVANCED_MEMORY_MECHANISM_BUILD_SPEC.md
        - docs/specs/L4B_RETRIEVAL_POLICY_SPEC.md
      first_pr: 21
      test_signal: repeated meals promote to reusable-meal candidates with drift checks, not transcript cache.
    - coverage_id: recommendation_entry_after_shared_planner
      source_refs:
        - docs/specs/L3_2_RECOMMENDATION_RUNTIME_INTERFACE_CONTRACT_SPEC.md
        - docs/specs/V2_EXECUTION_ARCHITECTURE_AND_WAVE_PLAN.md
      first_pr: 29
      test_signal: recommendation work starts from shared planner/runtime contract rather than a separate orchestration model.

best_practice_evidence:
  required: true
  sources_checked:
    - openai_agents_tools
    - openai_agents_sessions
    - openai_agents_guardrails
    - openai_evaluation_best_practices
    - openai_agent_evals
  source_urls:
    openai_agents_tools: https://openai.github.io/openai-agents-python/tools/
    openai_agents_sessions: https://openai.github.io/openai-agents-python/sessions/
    openai_agents_guardrails: https://openai.github.io/openai-agents-python/guardrails/
    openai_evaluation_best_practices: https://developers.openai.com/api/docs/guides/evaluation-best-practices
    openai_agent_evals: https://developers.openai.com/api/docs/guides/agent-evals
  adopted_guidance:
    - use_one_manager_plus_tools_runtime_contract_instead_of_parallel_orchestration_models
    - keep_session_history_and_durable_memory_separate
    - keep_tool_guardrails_at_tool_boundaries
    - use_trace_grading_and_task_specific_eval_sets_before_activation
    - validate_realistic_multi_intent_workflows_with_holdouts_and_human_calibration
  rejected_guidance:
    - separate_advanced_manager_architecture_for_lab_only_capabilities
    - hidden_provider_cache_as_reusable_meal_truth
    - transcript_replay_as_primary_context_pack
  conflict_with_repo_habits: >
    Advanced lab already has direct runtime artifact paths that are useful for closure
    but must converge toward the shared manager loop.
  how_the_design_changed: >
    The next build train starts from planner and tool/runtime convergence rather than
    from deeper recommendation logic.

alignment_rule:
  upstream_truth_branch: main
  upstream_truth_contract_family: CurrentShell_ManagerRuntime
  advanced_lab_role: additive_capability_extension
  forbidden_drift:
    - advanced_lab_local_manager_semantics_becoming_upstream_truth
    - advanced_lab_tool_vocabulary_redefining_current_shell_contracts
    - advanced_lab_truth_owners_conflicting_with_current_shell_truth_owners

llm_deterministic_boundary:
  decision_surface: context_engineering_skeleton_and_shared_manager_loop
  truth_owner: hybrid
  deterministic_role:
    - validate_scope
    - validate_tool_availability
    - enforce_ordering_constraints
    - block_illegal_mutation
    - compile_omission_trace
    - derive_reuse_downgrade_for_recurring_meal_candidates
  llm_role:
    - classify_turn
    - plan_capabilities
    - choose_when_to_call_tools
    - synthesize_final_response
  do_not_override:
    - canonical_meal_thread_truth
    - canonical_budget_and_ledger_truth
    - canonical_body_plan_truth
    - ProposalContainer_status_and_legality
    - reviewed_memory_record_truth
    - reusable_meal_template_drift_policy

semantic_owner:
  user_intent: ManagerRuntime
  food_semantics: FoodDB_and_intake_runtime_contracts
  routing_or_workflow_effect: shared_manager_turn_plan_contract
  mutation_legality: deterministic_guards_and_canonical_mutation_layers
  persistence_truth: canonical_product_objects_plus_reviewed_memory_and_future_reusable_meal_entities

