capability_dependency_check:
  capability_layer: L1 InteractionEvent / CurrentTurnContext, with L2/L4/L8/L9 convergence requirements
  upstream_dependencies:
    - layer: L0 Product Operating Rules
      contract_status: tested
      risk_if_missing: planner work can drift away from shared product truth.
    - layer: L1 InteractionEvent / CurrentTurnContext
      contract_status: tested
      risk_if_missing: advanced capabilities can fork into a second routing model.
    - layer: L2 AttachmentDecision / TransitionGuardResult
      contract_status: contract_backed
      risk_if_missing: multi-capability turns can attach tools to the wrong object or proposal.
    - layer: L4 RetrievalIntent / Source Selection
      contract_status: tested
      risk_if_missing: memory, rescue, and recurring-meal retrieval can leak transcript or bypass typed context.
    - layer: L8 Mutation / Ledger / Version
      contract_status: draft
      risk_if_missing: planner and reusable-meal work can fake mutation legality or bypass proposal and ledger truth.
  slice_mode:
    - contract_guard
    - eval
    - lab_only_runtime
    - offline_runtime
  user_facing_behavior_changed: false
  runtime_truth_changed: false
  mutation_changed: false
  safe_to_proceed_now: true
  why_not_local_next_step_trap: >
    Recommendation, rescue, and proactive already have enough lab depth that further domain
    work without a shared planner skeleton would increase integration cost and semantic drift.

branch_strategy:
  target_branch: codex/advanced-product-lab
  stable_repo_branches:
    - main
    - codex/advanced-product-lab
  additional_long_lived_branches_allowed: false
  short_lived_pr_branches_required: false
  logical_pr_slices_run_on_same_branch: true
  merge_mainline: main_remains_dormant
  lab_runtime_surface_may_be_complete: true
  lab_user_facing_surfaces_allowed: true
  lab_isolated_mutation_ledger_allowed: true
  lab_scheduler_simulation_allowed: true
  live_grokfast_diagnostics_allowed: true
  kimi_live_calls_allowed: false
  mainline_activation_enabled: false
  self_use_v1_affected: false
  keep_long_lived_lab_branch: true

required_artifact_flags:
  lab_enabled: true
  lab_isolated: true
  mainline_activation_enabled: false
  mainline_runtime_connected: false
  mainline_route_or_api_mount_allowed: false
  production_manager_mount_allowed: false
  production_scheduler_delivery_allowed: false
  production_db_migration_allowed: false
