artifact_type: current_shell_self_use_golden_set_manifest
version: 1
launch_scope: current_shell_v1_desktop_local_self_use
owner_lane: SharedCurrentShell
runtime_contract_owner: ManagerRuntime
downstream_shell_owner: AppShell
case_count: 19
live_model_policy:
  primary_self_use_gate: grokfast
  kimi_status: non_blocking_cross_model_diagnostic
fixture_policy:
  fixtures_may_seed_state: true
  fixtures_may_decide_intent: false
  fixtures_may_decide_action: false
  fixtures_may_decide_attach_target: false
  fixtures_may_decide_mutation_outcome: false
  fixtures_may_decide_response_meaning: false
non_claims:
  product_readiness_claimed: false
  private_self_use_approved: false
  whole_product_mvp_ready: false
  production_ready: false
  fooddb_truth_promoted: false
global_invariants:
  - invariant_id: G0_real_entrypoint_no_fake_pass
    gate: hard
    rule: Fixtures may seed state only; runtime trace or correlated browser trace must prove the behavior.
  - invariant_id: G1_semantic_owner
    gate: hard
    rule: Manager owns semantic intent, action, attachment, correction/removal target, and final action.
  - invariant_id: G2_context_engineering
    gate: hard
    rule: Context packets provide current turn, session, pending state, recent threads, candidates, and read-model summaries without choosing final semantics.
  - invariant_id: G3_evidence_and_food_truth
    gate: hard
    rule: Nutrition and source facts come only from user facts, approved packets, approved synthesis, or read models.
  - invariant_id: G4_manager_react_loop
    gate: hard
    rule: Manager pass1, tools, compact packets, pass2, guard, mutation, renderer basis, and response basis must be traceable.
  - invariant_id: G5_nutrition_synthesis
    gate: hard
    rule: Exact, generic, patterned combo, bare basket, and listed component estimates use distinct postures.
  - invariant_id: G6_state_and_versioning
    gate: hard
    rule: Ask-followup and answer-only cannot commit; write actions require version and ledger trace.
  - invariant_id: G7_response_contract
    gate: hard_plus_judged
    rule: User-visible responses must be state-consistent zh-TW assistant text without internal debug wording.
  - invariant_id: G8_ui_same_truth
    gate: hard
    rule: Chat, Today, Body, Feedback, and Review consume backend/read-model truth only.
  - invariant_id: G9_pending_and_durability
    gate: hard
    rule: Pending and queued chat messages survive navigation and queued messages run as the next Manager turn.
  - invariant_id: G10_observability_and_latency
    gate: hard_plus_budget
    rule: Every case records correlated trace IDs, timing spans, call topology, and final visible output.
  - invariant_id: G11_activation_boundary
    gate: hard
    rule: The gate proves Current Shell desktop self-use behavior only and makes no readiness or production claim.
trace_layers:
  blocking:
    - provider_profile_and_prompt_versions
    - current_turn_context_packet
    - manager_pass_1_decision
    - requested_tools
    - filtered_tool_plan
    - executed_tools
    - compact_packets
    - manager_pass_2_synthesis
    - guard_result
    - mutation_result
    - renderer_input_basis
    - final_response_basis
  diagnostic:
    - latency_cost_cache_usage
    - ui_event_trace
    - feedback_linkage
grading_policy:
  generalization_policy:
    exact_utterance_only_pass_blocks: true
    keyword_or_fixture_shortcut_blocks: true
    case_pass_represents_failure_family: true
    holdout_coverage_required_before_self_use_closeout: true
  deterministic_hard_fail:
    - semantic_owner_violation
    - missing_blocking_trace_layer
    - illegal_mutation
    - invented_kcal_macro_remaining_or_source_exactness
    - state_or_read_model_mismatch
    - frontend_truth_math
    - lost_pending_or_queued_message
  llm_judge_scope:
    allowed:
      - explanation_completeness
      - understandable_to_normal_user
      - uncertainty_explained_naturally
      - followup_question_clarity
      - assistant_like_zh_tw_naturalness
    forbidden:
      - mutation_legality
      - target_attachment_correctness
      - nutrition_fact_truth
      - fooddb_evidence_sufficiency
      - ui_read_model_sync
  latency_policy:
    timeout_is_product_target: false
    timeout_role: diagnostic_ceiling
    target_budget_role: performance_budget
dogfood_trace_storage:
  primary_review_surface: structured_trace
  raw_payload_policy: local_deep_debug_refs
  export_role: optional_backup_and_tooling
fooddb_posture_policy:
  patterned_combo_anchor_policy: posture_driven
  required_packet_fields:
    - runtime_estimate_allowed
    - composition_posture
    - commit_posture
    - macro_visibility_status
    - macro_source_strength
  no_anchor_behavior: ask_followup_without_commit
