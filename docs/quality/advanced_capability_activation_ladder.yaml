        - proposal_candidate
        - explicit_accept_required
        - budget_mutation_allowed
        - non_claims
      acceptance_status: gap_requires_next_slice
      next_build_slice: planned_event_rescue_shadow_negotiation
      claim_boundary: non_claim
      mainline_activation_allowed: false
    - journey_id: I
      journey_name: calibration_proposal_from_body_trend
      capability_domains:
        - calibration
        - rescue
        - recommendation
        - chat_ux_packet
      product_contract_refs:
        - docs/specs/L3_3B_CALIBRATION_PROPOSAL_POLICY_RUNTIME_CONTRACT_SPEC.md#proposal-eligibility-gate
        - docs/specs/L0_PRODUCT_CAPABILITY_SPEC.md#body-calibration
        - docs/specs/L3_5_BODY_OBSERVATION_EXERCISE_WORKFLOW_SPEC.md#body-observation-workflow
      existing_shadow_artifacts:
        - calibration_proposal_boundary_contract
        - body_budget_preview_contract
      required_trace_fields:
