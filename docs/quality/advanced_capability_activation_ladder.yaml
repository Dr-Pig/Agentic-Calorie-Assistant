        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#proposal-first
        - docs/specs/L0_PRODUCT_CAPABILITY_SPEC.md#proposal
      existing_shadow_artifacts:
        - rescue_proposal_shaping_input_shadow_packet
        - rescue_proposal_shaping_output_validation_shadow
      required_trace_fields:
