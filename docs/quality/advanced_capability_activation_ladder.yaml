    - journey_id: L
      journey_name: contextual_recommendation_to_pending_meal_intent
      capability_domains:
        - recommendation
        - long_term_memory
        - chat_ux_packet
      product_contract_refs:
        - docs/specs/L3_2_RECOMMENDATION_RUNTIME_INTERFACE_CONTRACT_SPEC.md#canonical-runtime-shape
        - docs/specs/UX_TO_SYSTEM_CAPABILITY_GAP_MATRIX.md#pending-meal-intent
