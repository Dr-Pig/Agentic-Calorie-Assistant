        - proposal_candidate_output
        - primary_actions
        - non_claims
      acceptance_status: existing_shadow_chain_mapped
      next_build_slice: rescue_chat_negotiation_and_lab_proposal_lifecycle
      claim_boundary: non_claim
      mainline_activation_allowed: false
    - journey_id: F2
      journey_name: planned_event_rescue_before_large_meal
      capability_domains:
