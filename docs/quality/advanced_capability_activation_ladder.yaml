artifact_type: advanced_capability_activation_ladder
version: 1
status: active_guardrail_contract
owner: MemoryRuntimeArchitecture
consumer: advanced_capability_activation_review
scope: advanced_runtime_lab_capabilities_only
current_mainline_unchanged: true
summary: >
  Guard-only activation contract for later-wave long-term memory,
  recommendation, rescue, and proactive capabilities. This contract constrains
  promotion from shadow/lab artifacts toward read-only runtime, canary,
  user-facing, and mutation-bearing stages without changing Current Shell
  self-use behavior.

stage_order:
  - contract
  - fake
  - deterministic
  - live_diagnostic
  - shadow
  - read_only_runtime
  - canary
  - user_facing
  - mutation_bearing

promotion_rules:
  one_step_promotion_only: true
  human_review_required_for_stage_change: true
  evidence_must_name_holdouts: true
  paired_baseline_comparison_required_from:
    - read_only_runtime
    - canary
    - user_facing
    - mutation_bearing
  rollback_or_kill_switch_required_from:
    - canary
    - user_facing
    - mutation_bearing
  activation_decision_must_record:
    - source_artifacts
    - current_stage
    - target_stage
    - scope_keys
    - user_facing_behavior_changed
    - canonical_mutation_changed
    - rollback_or_no_commit_fallback
    - human_review_decision

pre_promotion_no_go_flags:
  applies_to: mainline_runtime_activation
  user_facing_behavior_changed: false
  canonical_mutation_changed: false
  durable_product_memory_written: false
  manager_context_packet_changed: false
  scheduler_activation_allowed: false
  notification_delivery_allowed: false
  recommendation_served: false
  rescue_proposal_committed: false
  route_or_api_activation_allowed: false
  product_db_migration_allowed: false
  live_provider_delivery_path_allowed: false

shadow_lab_scope:
  goal: complete_product_capability_and_ux_tasks
  complete_product_capability_allowed: true
  lab_only_user_facing_surfaces_allowed: true
  lab_only_scheduler_simulation_allowed: true
  lab_only_isolated_mutation_ledger_allowed: true
  lab_only_durable_memory_store_allowed: true
  live_llm_diagnostic_allowed: true
  real_user_feedback_replay_allowed: true
  mainline_runtime_connection_allowed: false
  mainline_route_or_api_mount_allowed: false
  mainline_scheduler_delivery_allowed: false
  canonical_product_db_mutation_allowed: false
  manager_context_packet_production_change_allowed: false
  required_isolation_markers:
    lab_isolated: true
    mainline_runtime_connected: false
    user_facing_behavior_changed_in_mainline: false
    canonical_mutation_changed_in_mainline: false
    durable_product_memory_written_in_mainline: false
    manager_context_packet_changed_in_mainline: false
    real_scheduler_or_notification_delivery: false
    lab_artifacts_may_include_complete_ux: true
  merge_back_rule: >
    Lab artifacts may model complete product UX and mechanisms, but code merged
    to main must keep those mechanisms behind lab-only runners, isolated stores,
    and explicit activation reviews until a later runtime activation PR promotes
    a named surface.

advanced_lab_execution_policy:
  current_first_slice: advanced_runtime_lab_dormancy_contract
  current_first_slice_live_provider_calls_allowed: false
  later_lab_live_diagnostics_allowed_after_dormancy_gate: true
  provider_dependency_inversion_required: true
  provider_family: builderspace
  diagnostic_live_model: grok-4-fast
  target_reasoning_model: kimi-k2.5
  kimi_live_calls_allowed_in_this_train: false
  proactive_surface: chat_only
  inbox_mirror_allowed: false
  push_line_or_os_notification_allowed: false
  fooddb_expansion_allowed: false
  fooddb_expansion_requires_real_self_use: true
  simulated_dogfood_allowed_until_real_traces_exist: true
  mainline_activation_requires_separate_pr: true
  model_profile_seam:
    default_live_diagnostic_profile_id: builderspace-grok-4-fast-advanced-shadow-lab-live-diagnostic
    target_reasoning_profile_id: builderspace-kimi-k2-5-advanced-shadow-lab-dormant-reference
    live_provider_calls_allowed_by_default: false
    kimi_selection_status: dormant_reference_only
    production_selected: false
    provider_specific_product_semantics_allowed: false
  required_dormant_merge_flags:
    mainline_runtime_connected: false
    mainline_route_or_api_mount_allowed: false
    production_manager_mount_allowed: false
    production_scheduler_delivery_allowed: false
    production_db_migration_allowed: false
    canonical_product_mutation_allowed: false
    manager_context_packet_changed: false
    user_facing_behavior_changed: false
    recommendation_served: false
    rescue_proposal_committed: false
    proactive_sent: false
    notification_delivery_allowed: false

stage_requirements:
  contract:
    required_evidence:
      - machine_readable_contract
      - owner_and_consumer_declared
      - non_claims_declared
    allowed_outputs:
      - contract_doc
      - unit_tests
    user_facing_behavior_changed: false
    canonical_mutation_changed: false
  fake:
    required_evidence:
      - fake_or_fixture_provider
      - schema_validation
      - no_runtime_imports
    allowed_outputs:
      - fixture_artifact
      - fake_provider_artifact
    user_facing_behavior_changed: false
    canonical_mutation_changed: false
  deterministic:
    required_evidence:
      - deterministic_replay
      - scope_isolation_check
      - no_live_llm_call
    allowed_outputs:
      - deterministic_diagnostic_artifact
      - validator_decision
    user_facing_behavior_changed: false
    canonical_mutation_changed: false
  live_diagnostic:
    required_evidence:
      - contract_backed_input_output_boundary
      - runtime_trace_artifact
      - no_direct_user_visible_authority
      - no_mutation_authority
    allowed_outputs:
      - live_diagnostic_trace
      - redacted_runtime_observation
    runtime_connected: true
    user_facing_behavior_changed: false
    canonical_mutation_changed: false
  shadow:
    required_evidence:
      - live_diagnostic_evidence
      - comparable_current_path_output
      - isolated_candidate_output
      - holdout_or_negative_cases
    allowed_outputs:
      - shadow_artifact
      - downstream_shadow_candidate
    runtime_connected: true
    user_facing_behavior_changed: false
    canonical_mutation_changed: false
  read_only_runtime:
    required_evidence:
      - shadow_evidence
      - scope_isolation_check
      - paired_baseline_comparison
      - omission_trace
      - latency_budget_observed
      - no_commit_fallback
    allowed_outputs:
      - read_only_runtime_trace
      - shadow_context_pack
      - paired_baseline_comparison
      - omission_trace
    runtime_connected: true
    user_facing_behavior_changed: false
    canonical_mutation_changed: false
    manager_context_packet_changed: false
    durable_product_memory_written: false
  canary:
    required_evidence:
      - read_only_runtime_evidence
      - explicit_canary_scope
      - rollback_or_kill_switch
      - monitoring_plan
      - human_review_approval
    allowed_outputs:
      - canary_decision_record
      - sampled_comparison_trace
    canonical_mutation_changed: false
  user_facing:
    required_evidence:
      - canary_evidence
      - user_visible_claim_boundary
      - fallback_behavior
      - human_review_approval
    allowed_outputs:
      - user_facing_activation_record
    canonical_mutation_changed: false
  mutation_bearing:
    required_evidence:
      - user_facing_stability_evidence
      - explicit_mutation_boundary
      - audit_trail
      - rollback_or_compensation_path
      - product_owner_approval
    allowed_outputs:
      - mutation_activation_record
    canonical_mutation_changed: true

capabilities:
  long_term_memory:
    owner_module: app/memory
    current_stage: read_only_runtime
    next_allowed_stage: canary
    depends_on: []
    stage_transition_evidence:
      artifact_type: runtime_lab_memory_stage_promotion_decision
      status: approved
      stage_change_recorded: true
      manual_promotion_approved: true
      current_stage_in_decision_artifact: shadow
      target_stage_in_decision_artifact: read_only_runtime
      activation_stage_after_decision: read_only_runtime
      required_source_pack: runtime_lab_memory_read_only_runtime_lab_pack
      required_human_review_artifact: runtime_lab_memory_stage_promotion_review_decision
    current_allowed_outputs:
      - runtime_lab_memory_read_only_runtime_lab_pack
      - shadow_memory_context_pack
      - runtime_lab_manager_memory_injection_comparison
      - runtime_lab_memory_consumer_summary_projection
      - runtime_lab_memory_stage_promotion_decision
    stage_specific_no_go:
      durable_product_memory_written: false
      manager_context_packet_changed: false
      cross_session_personalization_allowed: false
  recommendation:
    owner_module: app/recommendation
    current_stage: read_only_runtime
    next_allowed_stage: canary
    depends_on:
      - long_term_memory.read_only_runtime
    stage_transition_evidence:
      artifact_type: recommendation_read_only_runtime_stage_decision
      status: approved
      stage_change_recorded: true
      manual_promotion_approved: true
      current_stage_in_decision_artifact: shadow
      target_stage_in_decision_artifact: read_only_runtime
      activation_stage_after_decision: read_only_runtime
      dependency_satisfied: long_term_memory.read_only_runtime
      required_preflight_artifact: recommendation_read_only_runtime_preflight
      required_human_review_artifact: recommendation_read_only_runtime_stage_review_decision
    current_allowed_outputs:
      - recommendation_read_only_runtime_preflight
      - recommendation_read_only_runtime_stage_decision
      - recommendation_shadow_summary_consumer_quality_report
      - recommendation_three_node_shadow_artifact
      - recommendation_offer_silent_shadow_contract
    stage_specific_no_go:
      recommendation_served: false
      live_search_allowed: false
      app_open_recommendation_serving: false
  rescue:
    owner_module: app/rescue
    current_stage: read_only_runtime
    next_allowed_stage: canary
    depends_on:
      - long_term_memory.read_only_runtime
    stage_transition_evidence:
      artifact_type: rescue_read_only_runtime_stage_decision
      status: approved
      stage_change_recorded: true
      manual_promotion_approved: true
      current_stage_in_decision_artifact: shadow
      target_stage_in_decision_artifact: read_only_runtime
      activation_stage_after_decision: read_only_runtime
      dependency_satisfied: long_term_memory.read_only_runtime
      required_preflight_artifact: rescue_read_only_runtime_preflight_report
      required_human_review_artifact: rescue_read_only_runtime_stage_review_decision
    current_allowed_outputs:
      - rescue_read_only_runtime_preflight_report
      - rescue_read_only_runtime_stage_decision
      - rescue_shadow_summary_context_projection
      - rescue_no_commit_viability_shadow_packet
      - rescue_proposal_shaping_input_shadow_packet
    stage_specific_no_go:
      rescue_proposal_committed: false
      budget_mutation_allowed: false
      proposal_acceptance_route_allowed: false
  proactive:
    owner_module: app/runtime/application
    current_stage: read_only_runtime
    next_allowed_stage: canary
    depends_on:
      - long_term_memory.read_only_runtime
      - recommendation.read_only_runtime
      - rescue.read_only_runtime
    stage_transition_evidence:
      artifact_type: proactive_read_only_runtime_stage_decision
      status: approved
      stage_change_recorded: true
      manual_promotion_approved: true
      current_stage_in_decision_artifact: shadow
      target_stage_in_decision_artifact: read_only_runtime
      activation_stage_after_decision: read_only_runtime
      dependencies_satisfied:
        - recommendation.read_only_runtime
        - rescue.read_only_runtime
      required_preflight_artifact: proactive_read_only_runtime_preflight_report
      required_human_review_artifact: proactive_read_only_runtime_stage_review_decision
    current_allowed_outputs:
      - proactive_read_only_runtime_preflight_report
      - proactive_read_only_runtime_stage_decision
      - proactive_no_send_summary_consumer_projection
      - proactive_no_send_decision_pack
    stage_specific_no_go:
      scheduler_activation_allowed: false
      notification_delivery_allowed: false
      trigger_persistence_allowed: false

best_practice_evidence:
  required: true
  sources_checked:
    - openai_agents_guardrails
    - openai_agent_evals
    - openai_evaluation_best_practices
    - openai_agents_sessions
    - openai_agents_sandbox_memory
  source_urls:
    openai_agents_guardrails: https://openai.github.io/openai-agents-python/guardrails/
    openai_agent_evals: https://developers.openai.com/api/docs/guides/agent-evals
    openai_evaluation_best_practices: https://developers.openai.com/api/docs/guides/evaluation-best-practices
    openai_agents_sessions: https://openai.github.io/openai-agents-python/sessions/
    openai_agents_sandbox_memory: https://openai.github.io/openai-agents-python/sandbox/memory/
  adopted_guidance:
    - separate_session_history_from_durable_memory
    - trace_grading_before_repeatable_eval_runs
    - datasets_and_holdouts_for_repeatable_promotion_decisions
    - tool_guardrails_for_side_effectful_tool_calls
    - memory_as_guidance_not_canonical_truth
    - separate_memory_layouts_for_isolation
  rejected_guidance:
    - durable_memory_write_before_user_review_and_rollback
    - raw_transcript_memory_dump_as_context
    - scheduler_or_delivery_activation_from_shadow_artifacts
  conflict_with_repo_habits:
    - existing_shadow_artifacts_are_useful_but_not_activation_permission
  how_the_design_changed:
    - promotion_is_recorded_as_manual_stage_review_not_shadow_report_success
    - read_only_runtime_is_observation_and_comparison_before_user_facing_use

llm_deterministic_boundary:
  decision_surface: activation_stage_change
  truth_owner: human
  deterministic_role: validate_reject_downgrade_and_block_side_effects
  llm_role: synthesize_candidates_only_when_stage_allows
  do_not_override:
    - canonical_meal_budget_body_or_ledger_truth
    - user_confirmed_memory_revocation
    - no_send_and_no_mutation_guards

semantic_owner:
  user_intent: ManagerRuntime_when_explicitly_activated
  food_semantics: FoodDB_and_intake_runtime_contracts
  routing_or_workflow_effect: ManagerRuntime_and_domain_workflow_contracts
  mutation_legality: canonical_mutation_boundaries_and_ledger_owners
  persistence_truth: approved_product_runtime_activation_ledger_entries

harness_minimization:
  artifact_classification: manual_promotion
  required_merge_check: false
  owner: MemoryRuntimeArchitecture
  consumer: advanced_capability_activation_review
  retirement_trigger: approved_product_runtime_activation_ledger_entries
  new_report_family_created: false

edge_case_coverage_contract:
  artifact_classification: merge_safe
  owner: AdvancedShadowLabCapabilityArchitecture
  consumer: advanced_shadow_comparison_artifact
  retirement_trigger: approved_advanced_runtime_activation_plan
  coverage_role: evidence_index_not_product_semantic_authority
  new_report_family_created: false
  live_diagnostics_required: false
  raw_keyword_semantic_oracle_allowed: false
  required_domains:
    - long_term_memory
    - recommendation
    - rescue
    - proactive
    - chat_ux_packet
  required_entry_fields:
    - edge_case_id
    - capability_domain
    - product_contract_refs
    - trace_fields
    - guard_or_rubric_refs
    - evidence_split
    - claim_boundary
    - raw_keyword_semantic_oracle_allowed
  coverage_entries:
    - edge_case_id: memory_scope_leak_rejected
      capability_domain: long_term_memory
      evidence_split: negative
      product_contract_refs:
        - docs/quality/runtime_lab_memory_edd_golden_set.yaml#missing_scope_rejects_memory_use
        - docs/quality/advanced_memory_mechanism_contract.yaml#scope_keys
      trace_fields:
        - memory_lab_scope
        - trace_fields.source_refs
        - expected_runtime_effects
      guard_or_rubric_refs:
        - scope_isolation
        - omission
        - no_canonical_mutation
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: memory_prompt_injection_rejected
      capability_domain: long_term_memory
      evidence_split: negative
      product_contract_refs:
        - docs/quality/runtime_lab_memory_edd_golden_set.yaml#prompt_injection_cannot_create_memory
        - docs/quality/advanced_memory_mechanism_contract.yaml#guardrails
      trace_fields:
        - trace_fields.manager_decision_field
        - trace_fields.source_refs
      guard_or_rubric_refs:
        - extraction
        - promotion_legality
        - secret_redaction
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: recommendation_negative_preference_filter
      capability_domain: recommendation
      evidence_split: fixture
      product_contract_refs:
        - docs/quality/runtime_lab_memory_edd_golden_set.yaml#negative_preference_blocks_recommendation_candidate
        - app/recommendation/application/three_node_shadow_policy.py#filter_reason_codes
      trace_fields:
        - negative_preference_summary.items
        - candidate_guard.filtered_candidates.reason_codes
      guard_or_rubric_refs:
        - deterministic_candidate_guard
        - confirmed_negative_preference
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: recommendation_budget_and_availability_filter
      capability_domain: recommendation
      evidence_split: fixture
      product_contract_refs:
        - app/recommendation/application/three_node_shadow_policy.py#candidate_guard
        - app/recommendation/application/three_node_shadow_contract.py#candidate_retrieval_guard_scoring
      trace_fields:
        - current_budget_view.remaining_kcal
        - candidate_source_fixture.estimated_kcal_range
        - candidate_source_fixture.hard_avoid_flags
      guard_or_rubric_refs:
        - over_budget
        - unavailable
        - deterministic_candidate_guard
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: rescue_no_commit_safety_floor
      capability_domain: rescue
      evidence_split: fixture
      product_contract_refs:
        - app/rescue/application/no_commit_viability.py#build_rescue_no_commit_viability_shadow_packet
        - app/rescue/application/shadow_chain_runner.py#run_rescue_shadow_chain
      trace_fields:
        - current_budget_view
        - active_body_plan_view.target_days
        - target_day_checks.safety_floor_passed
      guard_or_rubric_refs:
        - below_safety_floor
        - daily_compression_above_15_percent
        - no_commit_viability
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: rescue_duplicate_open_proposal_blocked
      capability_domain: rescue
      evidence_split: negative
      product_contract_refs:
        - app/rescue/application/no_commit_viability.py#_input_blockers
        - app/rescue/application/shadow_chain_runner.py#FORBIDDEN_TRUE_FLAGS
      trace_fields:
        - open_proposals_view.open_rescue_proposal_count
        - blockers
      guard_or_rubric_refs:
        - open_rescue_proposal
        - rescue_committed
        - proposal_committed
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: proactive_no_send_controls_required
      capability_domain: proactive
      evidence_split: fixture
      product_contract_refs:
        - app/runtime/application/proactive_no_send_nudge_candidate.py#build_no_send_nudge_candidate
        - app/runtime/application/proactive_no_send_interaction_model.py#apply_no_send_candidate_interaction
      trace_fields:
        - dismiss_reason_choices
        - snooze_window
        - undo_scope
        - next_signal_required
      guard_or_rubric_refs:
        - dismiss_reason_choices_missing
        - snooze_window_missing
        - undo_scope_missing
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: proactive_delivery_and_scheduler_blocked
      capability_domain: proactive
      evidence_split: negative
      product_contract_refs:
        - app/runtime/application/proactive_no_send_review_sink.py#CLAIM_FLAGS
        - app/advanced_shadow_lab/e2e_fixture_chain_policy.py#FALSE_FLAG_NAMES
      trace_fields:
        - delivery_attempted
        - scheduler_enqueued
        - proactive_sent
        - live_delivery_allowed
      guard_or_rubric_refs:
        - not_notification
        - not_scheduler_queue
        - not_live_delivery
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
    - edge_case_id: chat_packet_no_generated_copy_or_delivery
      capability_domain: chat_ux_packet
      evidence_split: fixture
      product_contract_refs:
        - app/advanced_shadow_lab/chat_ux_packet.py#build_advanced_shadow_chat_ux_packet
        - app/advanced_shadow_lab/chat_ux_copy_alignment.py#public_copy_metadata
      trace_fields:
        - copy_alignment_summary
        - copy_source_metadata
        - controls
        - served_to_user
      guard_or_rubric_refs:
        - not_chat_delivery
        - not_notification_delivery
        - copy_diagnostic_metadata_only
      claim_boundary: non_claim
      raw_keyword_semantic_oracle_allowed: false
  ux_acceptance_role: acceptance_map_not_product_readiness_authority
  ux_acceptance_entries:
    - journey_id: F
      journey_name: same_day_rescue_after_overshoot
      capability_domains:
        - rescue
