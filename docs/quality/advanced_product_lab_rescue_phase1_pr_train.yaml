    openai_agents_sandbox_memory: https://openai.github.io/openai-agents-python/sandbox/memory/
  adopted_guidance:
    - use_tool_guardrails_for_side_effectful_tool_calls
    - use_reproducible_trace_grading_and_datasets_before_activation
    - keep_session_history_separate_from_durable_memory
    - treat memory_as_guidance_not_canonical_truth
    - use_scope_isolated_memory_layouts
  rejected_guidance:
    - hidden_scheduler_delivery_before_user_controls
    - raw_transcript_dump_into_manager_context
    - provider_result_as_product_truth_without_validator
  conflict_with_repo_habits:
    - existing shadow artifacts are useful but too no-claim-heavy for the complete lab product loop.
  how_the_design_changed:
    - the lab branch may complete rescue UX, isolated ledger effects, and E2E loops.
    - merge-back still records dormant mainline flags and requires separate activation PRs.

