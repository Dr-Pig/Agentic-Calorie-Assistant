pr_train:
  - pr_number: 1
    slice_id: rescue_phase1_spec_to_slice_reconciliation
    goal: Record this 24-PR rescue Phase 1 train, clause coverage matrix, and dynamic estimate protocol.
    slice_mode: [contract_guard, wrapper_evidence_wiring]
    completion_gate: plan is test-backed and indexed without becoming bootstrap truth.
  - pr_number: 2
    slice_id: rescue_golden_set_and_rubrics
    goal: Add F, F2, T, attachment ambiguity, and no-rescue-in-intake golden cases.
    slice_mode: [fixture_only, eval]
    completion_gate: CI can prove what rescue behavior means before runtime changes.
  - pr_number: 3
    slice_id: self_use_trace_ingress_adapter
    goal: Convert current self-use calorie, budget, body, and meal traces into lab RescueIngressEvent fixtures.
    slice_mode: [diagnostic_only, offline_runtime]
    completion_gate: self-use V1 traces help rescue lab without adding advanced inputs to self-use V1.
  - pr_number: 4
    slice_id: rescue_read_model_input_contracts
    goal: Define rescue input views for CurrentBudgetView, RecentCommittedMealsView, ActiveBodyPlanView, OpenProposalsView, and ProactiveStatusView.
    slice_mode: [contract_guard, fixture_only]
    completion_gate: rescue reads structured state first and omits long transcript retrieval.
  - pr_number: 5
    slice_id: rescue_guardrail_math_and_safety_floor
    goal: Implement deterministic overshoot, cap, horizon, and safety-floor math fixtures.
    slice_mode: [deterministic, product_capability]
    completion_gate: L3M math boundaries pass without LLM ownership.
  - pr_number: 6
    slice_id: trigger_and_viability_assessment_node
    goal: Implement Node 1 trigger and viability assessment against read models and blockers.
    slice_mode: [deterministic, product_capability]
    completion_gate: node does not read current intake event context as its trigger source.
  - pr_number: 7
    slice_id: option_generation_single_spread_node
    goal: Implement Node 2 single-spread option generation with viable, strained, and non-viable outputs.
    slice_mode: [deterministic, product_capability]
    completion_gate: no multi-family proposal menu enters v1 rescue.
  - pr_number: 8
    slice_id: effective_from_11am_boundary
    goal: Add deterministic effective_from policy for same-day and tomorrow rescue overlays.
    slice_mode: [deterministic, product_capability]
    completion_gate: 11:00 local-time boundary is fixture-covered.
  - pr_number: 9
    slice_id: rescue_degraded_modes
    goal: Add logging-first, provider-unavailable, required-view-unavailable, and onboarding-missing degraded behavior.
    slice_mode: [contract_guard, deterministic]
    completion_gate: missing CurrentBudgetView blocks rescue and missing onboarding routes to onboarding guidance.
  - pr_number: 10
    slice_id: reactive_rescue_independent_message_flow
    goal: Add reactive rescue flow that creates an independent rescue message after explicit user request.
    slice_mode: [lab_only_runtime, product_capability]
    completion_gate: intake reply never contains formal rescue proposal or ledger overlay.
  - pr_number: 11
    slice_id: rescue_chat_ux_packet_and_copy_guard
    goal: Build chat-first rescue UX packet and output guard for no-shame, future-oriented proposal framing.
    slice_mode: [lab_only_runtime, ux_packet]
    completion_gate: proposal copy is guarded and does not become deterministic math truth.
  - pr_number: 12
    slice_id: planned_event_budget_allocation_f2
    goal: Implement pre-event planned_event_budget_allocation proposal flow for known big meals.
    slice_mode: [lab_only_runtime, product_capability]
    completion_gate: F2 requires confirmation before future overlay projection.
  - pr_number: 13
    slice_id: gathering_day_allocation_t
    goal: Implement gathering-day planning split between informational allocation and explicit reserve proposal.
    slice_mode: [lab_only_runtime, product_capability]
    completion_gate: T escalates to proposal only when the user asks to set or reserve budget.
  - pr_number: 14
    slice_id: proposal_shaping_llm_seam
    goal: Add Node 3 proposal shaping seam with fake provider, Grokfast diagnostic payload, and output validator.
    slice_mode: [live_diagnostic, provider_seam]
    completion_gate: live Grokfast output is advisory until deterministic validator accepts shape.
  - pr_number: 15
    slice_id: response_presentation_and_card_contract
    goal: Add Node 4 response presentation, RescueResponseCard, primary actions, and secondary negotiation affordance contract.
    slice_mode: [live_diagnostic, ux_packet]
    completion_gate: primary actions are accept_rescue_plan and dismiss_rescue_plan only.
  - pr_number: 16
    slice_id: accept_rescue_plan_api_contract
    goal: Implement lab accept contract for chat, UI, and smart-chip sources.
    slice_mode: [lab_only_runtime, mutation_bearing_lab]
    completion_gate: accept requires proposal_id, user_id, accepted_at, cap_mode, and source audit.
  - pr_number: 17
    slice_id: dismiss_rescue_plan_contract
    goal: Implement dismiss contract without backup switching, mandatory reason, permanent mute, or snooze.
    slice_mode: [lab_only_runtime, product_capability]
    completion_gate: dismiss removes active lab proposal while preserving history/audit.
  - pr_number: 18
    slice_id: complaint_negotiation_attachment_priority
    goal: Implement attachment priority for complaints, feasibility questions, adjust, explain, accept, and dismiss.
    slice_mode: [lab_only_runtime, product_capability]
    completion_gate: ambiguous utterances become answer_only and do not mutate proposal state.
  - pr_number: 19
    slice_id: isolated_lab_commit_effect_and_ledger_overlay
    goal: Project accepted rescue plans into an isolated lab ledger overlay and RescueCommitEffect.
    slice_mode: [lab_only_runtime, mutation_bearing_lab]
    completion_gate: lab ledger changes never touch production DB or mainline canonical state.
  - pr_number: 20
    slice_id: proposal_inbox_history_audit_read_model
    goal: Add active proposal inbox mirror, history, and audit read model without raw trace leakage.
    slice_mode: [read_model, lab_only_runtime]
    completion_gate: UI mirrors chat-first proposal truth instead of becoming the primary interaction path.
  - pr_number: 21
    slice_id: recommendation_posture_refresh_handoff
    goal: Refresh recommendation posture after accepted lab rescue overlays.
    slice_mode: [integration, lab_only_runtime]
    completion_gate: recommendation sees short-term caloric posture without creating recommendation intent state.
  - pr_number: 22
    slice_id: rescue_feedback_memory_projection
    goal: Project rescue accept, dismiss, complaint, correction, and outcome feedback into reviewed memory candidates.
    slice_mode: [feedback_projection, lab_only_runtime]
    completion_gate: FeedbackEvent remains audit/input and cannot directly mutate memory truth.
  - pr_number: 23
    slice_id: proactive_rescue_nudge_bridge
    goal: Integrate proactive rescue nudge simulation with cooldown, suppression, dismiss, and chat-first controls.
    slice_mode: [proactive, lab_only_runtime]
    completion_gate: lab proactive rescue can complete the loop while mainline scheduler delivery remains disabled.
  - pr_number: 24
    slice_id: rescue_phase1_integrated_e2e_decision_pack
    goal: Run fixture, simulated self-use replay, Grokfast diagnostic, lab accept/dismiss, and F/F2/T integrated E2E decision pack.
    slice_mode: [e2e, closure, activation_wall]
    completion_gate: decision pack distinguishes complete lab product loop from dormant mainline merge-back.

