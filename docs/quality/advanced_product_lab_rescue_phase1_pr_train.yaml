capability_dependency_check:
  capability_layer: L9 Same-Truth / UI / Memory / Proactive, with L2/L3/L4 runtime dependencies
  upstream_dependencies:
    - layer: L1 InteractionEvent / CurrentTurnContext
      contract_status: tested
      risk_if_missing: rescue could attach ambiguous chat turns to the wrong object.
    - layer: L2 AttachmentDecision / TransitionGuardResult
      contract_status: contract_backed
      risk_if_missing: complaint, dismiss, accept, and negotiation could mutate the wrong proposal.
    - layer: L3 MealThread / Draft / Commit Boundary
      contract_status: tested
      risk_if_missing: intake overshoot awareness could accidentally create a rescue proposal.
    - layer: L4 RetrievalIntent / Source Selection
      contract_status: tested
      risk_if_missing: rescue could use long memory or transcript context instead of short structured state.
    - layer: L8 Mutation / Ledger / Version
      contract_status: draft
      risk_if_missing: accepted rescue overlays could bypass ProposalContainer and LedgerEntry audit.
  slice_mode:
    - contract_guard
    - product_capability
    - live_diagnostic
    - lab_only_runtime
  user_facing_behavior_changed: false
  runtime_truth_changed: false
  mutation_changed: false
  safe_to_proceed_now: true
  why_not_local_next_step_trap: >
    The first slice records the whole train and clause coverage before adding code,
    so later runtime work cannot drift toward local harness convenience.

branch_strategy:
  target_branch: codex/advanced-product-lab
  short_branch_prefix: codex/advanced-rescue-phase1-pr
  merge_mainline: main_remains_dormant
  lab_runtime_surface_may_be_complete: true
  lab_user_facing_surfaces_allowed: true
  lab_isolated_mutation_ledger_allowed: true
  lab_scheduler_simulation_allowed: true
  live_grokfast_diagnostics_allowed: true
  kimi_live_calls_allowed: false
  mainline_activation_enabled: false
  self_use_v1_affected: false
  keep_long_lived_lab_branch: true

required_artifact_flags:
  lab_enabled: true
  lab_isolated: true
  lab_product_loop_may_be_complete: true
  mainline_activation_enabled: false
  mainline_runtime_connected: false
  mainline_route_or_api_mount_allowed: false
  production_manager_mount_allowed: false
  production_scheduler_delivery_allowed: false
  canonical_product_db_mutation_allowed: false
  canonical_product_mutation_allowed: false
  manager_context_packet_changed_in_mainline: false
  user_facing_behavior_changed_in_mainline: false
  durable_product_memory_written_in_mainline: false
  real_scheduler_or_notification_delivery: false
  fooddb_expansion_required: false

dynamic_estimate_protocol:
  update_after_each_merge: true
  estimate_may_increase: true
  estimate_may_decrease: true
  do_not_use_chat_memory_as_only_plan: true
  update_fields:
    - dynamic_remaining_pr_count
    - last_completed_pr_number
    - last_merge_evidence
    - estimate_notes
  persistent_truth_files:
    - docs/quality/advanced_product_lab_rescue_phase1_pr_train.yaml
    - docs/quality/advanced_product_lab_rescue_phase1_golden_set.yaml
    - docs/quality/advanced_capability_activation_ladder.yaml
    - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md

spec_coverage_matrix:
  canonical_source_refs:
    - docs/specs/L0_PRODUCT_CAPABILITY_SPEC.md
    - docs/specs/L1_RUNTIME_OWNERSHIP_SPEC.md
    - docs/specs/L2_DATA_STATE_SPEC.md
    - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md
    - docs/specs/L3M_GUARDRAIL_MATH_SPEC.md
    - docs/specs/L4B_RETRIEVAL_POLICY_SPEC.md
    - docs/specs/L4C_CONTEXT_PACKING_SPEC.md
    - docs/specs/L3_6_PROACTIVE_SCHEDULER_SPEC.md
    - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md
  required_clauses:
    - coverage_id: intake_rescue_separation
      source_refs:
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#4.0
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#9.7
        - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md#F
      first_pr: 10
      test_signal: intake reply can contain overshoot awareness but no formal rescue proposal.
    - coverage_id: guardrail_math_and_safety_floor
      source_refs:
        - docs/specs/L3M_GUARDRAIL_MATH_SPEC.md
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#10.2
      first_pr: 5
      test_signal: deterministic math owns overshoot, cap, horizon, and safety-floor legality.
    - coverage_id: trigger_and_viability_node
      source_refs:
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#6
      first_pr: 6
      test_signal: trigger assessment reads structured state, not current intake event context.
    - coverage_id: option_generation_single_spread
      source_refs:
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#7
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#8.4
      first_pr: 7
      test_signal: v1 produces one spread proposal, not a multi-family menu.
    - coverage_id: effective_from_11am_boundary
      source_refs:
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#3.1A
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#13.3
      first_pr: 8
      test_signal: accepted rescue takes effect today before 11:00 and tomorrow after 11:00.
    - coverage_id: degraded_modes
      source_refs:
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#18
      first_pr: 9
      test_signal: missing budget blocks rescue, missing onboarding guides onboarding, provider failure degrades.
    - coverage_id: proposal_container_accept_dismiss
      source_refs:
        - docs/specs/L1_RUNTIME_OWNERSHIP_SPEC.md#3.4
        - docs/specs/L2_DATA_STATE_SPEC.md#3.9
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#14B
      first_pr: 15
      test_signal: accept and dismiss are explicit proposal actions and never implicit mutation.
    - coverage_id: complaint_not_dismiss_attachment
      source_refs:
        - docs/specs/L1_RUNTIME_OWNERSHIP_SPEC.md#4.10
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#9.5A
      first_pr: 18
      test_signal: complaint, uncertainty, and feasibility questions remain negotiation or answer-only.
    - coverage_id: planned_event_budget_allocation
      source_refs:
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#17A
        - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md#F2
      first_pr: 12
      test_signal: planned event proposals are pre-event rescue variants and require confirmation.
    - coverage_id: gathering_day_allocation
      source_refs:
        - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md#T
      first_pr: 13
      test_signal: gathering guidance remains informational unless the user asks to reserve or set budget.
    - coverage_id: rescue_retrieval_context_pack
      source_refs:
        - docs/specs/L4B_RETRIEVAL_POLICY_SPEC.md#7
        - docs/specs/L4C_CONTEXT_PACKING_SPEC.md#7
      first_pr: 4
      test_signal: rescue context uses current budget, recent meals, rescue history, adherence, and open proposals.
    - coverage_id: recommendation_posture_refresh
      source_refs:
        - docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md#11
        - docs/specs/L3_2_RECOMMENDATION_RUNTIME_INTERFACE_CONTRACT_SPEC.md
      first_pr: 21
      test_signal: accepted lab rescue overlay refreshes recommendation posture in the lab read model.
    - coverage_id: proactive_rescue_nudge_boundary
      source_refs:
        - docs/specs/L3_6_PROACTIVE_SCHEDULER_SPEC.md
        - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md#N-3
      first_pr: 22
      test_signal: proactive rescue nudge is independent, controlled, and chat-first in the lab.
    - coverage_id: integrated_journey_f_f2_t
      source_refs:
        - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md#F
        - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md#F2
        - docs/quality/UX_JOURNEY_TO_SLICE_MAP.md#T
      first_pr: 24
      test_signal: F, F2, and T pass as an integrated lab E2E without mainline activation.

