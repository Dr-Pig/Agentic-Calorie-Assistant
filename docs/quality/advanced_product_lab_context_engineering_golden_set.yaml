artifact_type: advanced_product_lab_context_engineering_golden_set
version: 2
status: active
owner: AdvancedProductLabContextEngineering
consumer: shared_manager_turn_plan_eval
purpose: >
  Stress the complete advanced-product Manager-style context engineering layer before
  the next proactive train. Cases validate tool selection, argument precision,
  ordering, omission, proposal boundaries, short-term state, memory/recommendation
  interplay, and over-trigger resistance.

strategic_gate:
  current_mainline: advanced_product_lab_context_engineering_stress_golden_set
  is_detour: false
  blocked_mainline: null
  detour_reason: null
  detour_exit_gate: not_applicable
  exit_gate_status: not_applicable
  return_slice_after_exit: not_applicable
  strategic_verdict: mainline
  mainline_blocker_being_removed: multi_capability_manager_tool_selection_not_yet_stress_graded

capability_dependency_check:
  capability_layer: L1 InteractionEvent / CurrentTurnContext with L2, L4, L8, L9 stress coverage
  upstream_dependencies:
    - layer: L0 Product Operating Rules
      contract_status: tested
      risk_if_missing: advanced lab could optimize fixtures instead of user-visible product behavior.
    - layer: L1 InteractionEvent / CurrentTurnContext
      contract_status: tested
      risk_if_missing: multi-capability turns could fork away from Current Shell manager semantics.
    - layer: L2 AttachmentDecision / TransitionGuardResult
      contract_status: contract_backed
      risk_if_missing: ambiguous references such as "that one" can attach to the wrong meal or recommendation.
    - layer: L4 RetrievalIntent / Source Selection
      contract_status: tested
      risk_if_missing: memory, reusable-meal, and recommendation context can leak transcript or use stale source truth.
    - layer: L8 Mutation / Ledger / Version
      contract_status: draft
      risk_if_missing: rescue and pending meal intent can look like accepted budget or meal mutations.
  slice_mode:
    - fixture_only
    - eval
    - lab_only_runtime
  user_facing_behavior_changed: false
  runtime_truth_changed: false
  mutation_changed: false
  safe_to_proceed_now: true
  why_not_local_next_step_trap: >
    The advanced lab has memory, rescue, and recommendation depth, but the next
    product risk is multi-capability orchestration and short-term context ownership.

best_practice_evidence:
  required: true
  sources_checked:
    - official_or_primary_source: https://developers.openai.com/api/docs/guides/evaluation-best-practices
      adopted_guidance: use objective-specific datasets, edge cases, adversarial cases, and continuous eval growth.
    - official_or_primary_source: https://developers.openai.com/api/docs/guides/agent-evals
      adopted_guidance: evaluate agent tool selection, argument precision, and handoff accuracy.
    - official_or_primary_source: https://openai.github.io/openai-agents-python/guardrails/
      adopted_guidance: use tool-level guardrails for manager/tool workflows, not only first/last agent guardrails.
    - official_or_primary_source: https://openai.github.io/openai-agents-python/sessions/
      adopted_guidance: separate session history from durable memory and limit retrieved history.
    - official_or_primary_source: https://docs.langchain.com/oss/python/concepts/memory
      adopted_guidance: separate short-term context, semantic memory, and episodic examples.
  rejected_guidance:
    - use_raw_keyword_or_fixture_labels_as_semantic_truth
    - treat_pending_meal_intent_as_long_term_memory
    - treat_recommendation_acceptance_as_canonical_meal_commit
  conflict_with_repo_habits: >
    Existing lab scripts are useful for evidence generation but still have scripted
    fixture semantics before live planner stress. This golden set tests the intended
    product truth rather than preserving runner convenience.
  how_the_design_changed: >
    PendingMealIntent is promoted to first-class short-term context in the plan,
    while remaining outside memory truth and canonical MealThread truth.

evaluation_policy:
  no_raw_keyword_semantic_oracle: true
  eval_assets_do_not_define_product_truth: true
  semantic_decision_owner: manager_llm_structured_output
  deterministic_validation_boundary:
    - schema
    - scope_keys
    - tool_availability
    - ordering_constraints
    - mutation_legality
    - omission_trace
    - argument_shape
  trace_surfaces:
    - ManagerTurnPlan
    - CapabilityRequest
    - ToolCallCandidate
    - tool_selection
    - argument_precision
    - tool_result_envelope
    - final_response_boundary
    - omission_trace
  grader_style:
    fixture: deterministic_trace_schema_plus_human_calibration
    negative_holdout: deterministic_forbidden_capability_and_boundary_check
    live_diagnostic_seed: grokfast_diagnostic_non_claim_artifact
  accepted_variants_policy: >
    Cases define required/forbidden capabilities and acceptable variants rather than
    exact final wording. Final responses must be natural chat and must not expose
    internal tool names.

global_decisions:
  primary_interaction_surface: chat_first
  multi_capability_anchor: intake_or_meal_thread_first_when_consumption_is_present
  context_pack_policy:
    structured_state_first: true
    transcript_is_evidence_not_primary_truth: true
    raw_transcript_dump_allowed: false
  pending_meal_intent:
    state_category: short_term_context
    ttl_hours: 6
    canonical_write_authorized: false
    followup_timing: meal_window_end
    quiet_hours_policy: chat_thread_message_only_no_push
    default_meal_windows:
      lunch: "11:00-14:30"
      dinner: "17:00-22:00"
      late_night: "22:00-01:00"
    meal_window_override_source: confirmed_or_pattern_meal_time_memory
    confirmation_handoff: intake_run_required
    dismissal_scope: current_intent_instance_only
  rescue:
    explicit_conditional_request_can_run_same_turn: true
    unprompted_overshoot_threshold_pct: 25
    proposal_only_until_user_accepts: true
    ledger_mutation_requires_acceptance: true
    suppression_policy:
      explicit_opt_out: confirmed_suppression_after_scope_source_validator
      dismiss_or_snooze: current_or_cooldown_control_only
      three_dismiss_or_ignore_within_days: 14
      repeated_dismiss_projection: pending_review_not_confirmed_memory
  memory:
    confirmed_negative_priority: block_or_downrank_before_positive_boost
    positive_profile_role: soft_boost_only
    discarded_or_uncertain_profile_signal: no_long_term_memory
    same_turn_explicit_negative_can_block_recommendation: true
  recommendation:
    physical_graph: three_node
    logical_trace_boundaries: 5
    pending_intent_handoff_allowed: true
    recommendation_acceptance_does_not_commit_meal: true
  main_alignment:
    upstream_truth_branch: main
    upstream_truth_contract_family: CurrentShell_ManagerRuntime
    advanced_lab_role: additive_capability_extension
    merge_back_posture: dormant_until_activation_pr

case_schema:
  required_fields:
    - case_id
    - split
    - category
    - coverage_scope
    - user_turn
    - expected_primary_workflow
    - expected_capabilities
    - forbidden_capabilities
    - expected_ordering_constraints
    - mutation_posture
    - expected_trace
    - accepted_variants
    - evaluator
    - source_refs
  non_semantic_fields:
    - notes

split_targets:
  fixture: 18
  negative_holdout: 8
  live_diagnostic_seed: 4

category_targets:
  multi_capability: 8
  intake_query_bridge: 5
  recommendation_memory: 5
  pending_meal_intent: 4
  rescue: 4
  overtrigger_holdout: 4

cases:
  - case_id: ce-stress-001
    split: fixture
    category: multi_capability
    coverage_scope: advanced_lab
    user_turn: "我剛吃一碗豚骨拉麵，如果今天超了幫我安排晚上，順便晚餐推薦不要辣的。"
    expected_primary_workflow: intake_budget_conditional_rescue_then_recommendation
    expected_capabilities: [intake, query, rescue, recommendation]
    forbidden_capabilities: [proactive, memory_write, scheduler_delivery]
    expected_ordering_constraints: [intake_before_query, query_before_rescue, rescue_before_recommendation]
    mutation_posture: intake_contract_result_and_rescue_proposal_only
    expected_trace:
      rescue: explicit_conditional_same_turn_if_budget_overshoot
      recommendation: same_turn_no_spicy_constraint
      final_response_boundary: recorded_vs_proposed_state_must_be_visible
    accepted_variants: [ask_clarifying_portion_before_rescue_if_intake_uncertain]
    evaluator: deterministic_trace_plus_human_calibration
    source_refs: [docs/specs/L3_4_RESCUE_RUNTIME_CONTRACT_SPEC.md, docs/specs/L3_2_RECOMMENDATION_RUNTIME_INTERFACE_CONTRACT_SPEC.md]

