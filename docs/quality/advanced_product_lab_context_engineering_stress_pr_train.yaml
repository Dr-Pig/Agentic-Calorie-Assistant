best_practice_evidence:
  required: true
  sources_checked:
    - official_or_primary_source: https://developers.openai.com/api/docs/guides/evaluation-best-practices
      adopted_guidance: design evals around objective, dataset, metrics, edge cases, adversarial cases, and continuous growth.
    - official_or_primary_source: https://developers.openai.com/api/docs/guides/agent-evals
      adopted_guidance: evaluate tool selection, data precision, and handoff accuracy for agent workflows.
    - official_or_primary_source: https://openai.github.io/openai-agents-python/guardrails/
      adopted_guidance: put side-effect-sensitive validation at tool guardrails.
    - official_or_primary_source: https://openai.github.io/openai-agents-python/sessions/
      adopted_guidance: do not collapse session history, short-term context, and durable memory into one store.
  rejected_guidance:
    - direct_proactive_delivery_before_manager_tool_selection_stress
    - pending_meal_intent_as_memory_record
    - keyword_oracle_for_multi_capability_route
  conflict_with_repo_habits: >
    Previous lab trains produced many evidence artifacts, but some still run through
    scripted manager semantics. This train makes the manager decision trace itself
    the object under eval.
  how_the_design_changed: >
    The next build starts with main-to-lab sync and golden-set executable stress
    rather than recommendation or proactive feature depth.

slice_train:
  - slice_number: 1
    slice_id: main_to_lab_sync_and_contract_drift_audit
    goal: Bring main into the lab worktree and record Current Shell contract drift before runtime-bearing edits.
    expected_artifacts: [main_sync_drift_report]
    test_focus: contract_diff_and_dormancy_wall
  - slice_number: 2
    slice_id: ce_stress_golden_set_loader_and_schema_gate
    goal: Add loader/schema checks for the 30-case stress set and split/category counts.
    expected_artifacts: [golden_set_loader_v2]
    test_focus: fixture_schema_and_no_keyword_oracle
  - slice_number: 3
    slice_id: mechanism_challenge_decision_pack
    goal: Make the pending meal intent and manager-skeleton critique executable as a decision pack.
    expected_artifacts: [mechanism_review_decision_pack]
    test_focus: adopted_rejected_options_and_truth_owners
  - slice_number: 4
    slice_id: pending_meal_intent_first_class_contract_extension
    goal: Extend PendingMealIntent contract for scope, TTL policy, meal-window posture, and context-pack identity.
    expected_artifacts: [pending_meal_intent_contract_v2]
    test_focus: contract_and_scope_validation
  - slice_number: 5
    slice_id: pending_meal_intent_lab_store_lifecycle
    goal: Add lab-isolated store/list/update/dismiss/expire behavior for short-term pending intents.
    expected_artifacts: [pending_meal_intent_lab_store]
    test_focus: lifecycle_isolation_and_no_canonical_commit
  - slice_number: 6
    slice_id: meal_window_policy_and_memory_override
    goal: Implement default meal windows and optional memory-derived override without scheduler delivery.
    expected_artifacts: [meal_window_policy_trace]
    test_focus: fixed_windows_memory_override_and_quiet_hours
  - slice_number: 7
    slice_id: rescue_suppression_feedback_projection
    goal: Implement explicit opt-out, dismiss/snooze cooldown, and 3-in-14 pending-review projection.
    expected_artifacts: [rescue_suppression_projection_trace]
    test_focus: feedback_event_scope_and_no_auto_memory_promotion
  - slice_number: 8
    slice_id: contract_backed_intake_bridge_for_advanced_lab
    goal: Replace fake-only intake bridge usage in CE stress with contract-backed Current Shell intake handoff.
    expected_artifacts: [advanced_lab_intake_bridge_trace]
    test_focus: no_direct_commit_and_argument_precision
  - slice_number: 9
    slice_id: multi_capability_manager_turn_plan_grader
    goal: Grade ManagerTurnPlan decisions against required/forbidden capabilities and acceptable variants.
    expected_artifacts: [ce_stress_trace_grade]
    test_focus: tool_selection_argument_precision_and_omission
  - slice_number: 10
    slice_id: tool_ordering_and_mutation_boundary_expansion
    goal: Expand tool-choice walls for pending intent, rescue, recommendation, memory, query, intake, and reusable meal overlaps.
    expected_artifacts: [tool_choice_wall_trace]
    test_focus: ordering_constraints_and_mutation_guard
  - slice_number: 11
    slice_id: fixture_planner_provider_for_ce_stress
    goal: Add a fake manager planner provider that emits structured decisions without keyword semantic ownership.
    expected_artifacts: [fixture_planner_trace]
    test_focus: provider_contract_and_no_raw_keyword_route
  - slice_number: 12
    slice_id: bounded_react_replanning_after_tool_results
    goal: Support pass-one/pass-two style re-planning after intake/query/memory results while preserving ReAct trace.
    expected_artifacts: [bounded_react_replan_trace]
    test_focus: tool_result_to_next_plan_without_loop_drift
  - slice_number: 13
    slice_id: final_response_boundary_packet
    goal: Add final chat packet checks distinguishing recorded facts, proposals, pending context, and no-op answers.
    expected_artifacts: [final_response_boundary_grade]
    test_focus: user_visible_honesty_without_tool_names
  - slice_number: 14
    slice_id: overtrigger_and_undertrigger_holdout_gate
    goal: Run ambiguity, prompt-injection, no-keyword, and explicit-do-not-trigger cases as holdout gates.
    expected_artifacts: [ce_stress_holdout_report]
    test_focus: forbidden_capability_and_clarification_behavior
  - slice_number: 15
    slice_id: grokfast_live_planner_diagnostic
    goal: Run the four live diagnostic seeds with Grokfast and write non-claim artifacts.
    expected_artifacts: [grokfast_ce_stress_live_diagnostic]
    test_focus: live_tool_selection_without_truth_rewrite
  - slice_number: 16
    slice_id: decision_pack_and_proactive_entry_gate
    goal: Aggregate fixture, holdout, and live diagnostic evidence and decide whether proactive train can start.
    expected_artifacts: [ce_stress_decision_pack, proactive_entry_gate]
    test_focus: readiness_claim_boundaries_and_dynamic_next_slice_estimate

merge_alignment_policy:
  before_slice_1: no_runtime_code_until_main_to_lab_sync_decision_is_recorded
  after_train: >
    Merge-back to main is allowed only as dormant advanced-lab artifacts unless a separate
    activation PR explicitly mounts routes, scheduler, DB migration, or production runtime.
  if_main_changes_contracts_mid_train: pause_runtime_slices_and_reaudit
