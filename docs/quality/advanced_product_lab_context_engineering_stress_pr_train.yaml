artifact_type: advanced_product_lab_context_engineering_stress_pr_train
version: 1
status: planned
owner: AdvancedProductLabContextEngineering
consumer: advanced_product_lab_proactive_recommendation_rescue_integration
planned_slice_count_likely: 16
dynamic_remaining_slice_count: 8
last_completed_slice_number: 8
active_slice_number: null

slice_count_range:
  optimistic: 14
  likely: 16
  conservative: 19

strategic_gate:
  current_mainline: advanced_product_lab_context_engineering_stress_and_pending_intent_hardening
  is_detour: false
  blocked_mainline: null
  detour_reason: null
  detour_exit_gate: not_applicable
  exit_gate_status: not_applicable
  return_slice_after_exit: not_applicable
  strategic_verdict: mainline
  mainline_blocker_being_removed: manager_style_advanced_capabilities_need_stress_proven_shared_context_engineering

capability_dependency_check:
  capability_layer: L1 InteractionEvent / CurrentTurnContext with L2/L4/L8/L9 convergence requirements
  upstream_dependencies:
    - layer: L0 Product Operating Rules
      contract_status: tested
      risk_if_missing: advanced lab could drift from chat-first proposal and activation-wall rules.
    - layer: L1 InteractionEvent / CurrentTurnContext
      contract_status: tested
      risk_if_missing: manager tool selection could fork away from Current Shell runtime contracts.
    - layer: L2 AttachmentDecision / TransitionGuardResult
      contract_status: contract_backed
      risk_if_missing: pending intent, correction, and recommendation handoff can attach to the wrong object.
    - layer: L4 RetrievalIntent / Source Selection
      contract_status: tested
      risk_if_missing: memory/reusable meal/recommendation can over-read transcript or stale source refs.
    - layer: L8 Mutation / Ledger / Version
      contract_status: draft
      risk_if_missing: rescue and intake handoff could imply mutation without explicit acceptance.
  slice_mode:
    - contract_guard
    - eval
    - lab_only_runtime
    - offline_runtime
  user_facing_behavior_changed: false
  runtime_truth_changed: false
  mutation_changed: false
  safe_to_proceed_now: true
  why_not_local_next_step_trap: >
    Proactive is downstream of context engineering. Building proactive delivery before
    multi-capability manager routing and pending intent lifecycle would hide activation
    and over-trigger risk.

branch_strategy:
  target_branch: codex/advanced-product-lab
  stable_repo_branches:
    - main
    - codex/advanced-product-lab
  main_to_lab_sync_required_before_runtime_slices: true
  merge_back_to_main_posture: dormant_until_activation_pr
  mainline_activation_enabled: false
  lab_runtime_surface_may_be_complete: true
  lab_user_facing_surfaces_allowed: true
  keep_long_lived_lab_branch: true
  short_lived_pr_branches_required: false
  logical_slices_run_on_same_branch: true

required_artifact_flags:
  lab_enabled: true
  lab_isolated: true
  mainline_activation_enabled: false
  mainline_runtime_connected: false
  production_scheduler_delivery_allowed: false
  production_route_or_api_mount_allowed: false
  production_db_migration_allowed: false
  canonical_product_mutation_allowed_on_main: false
  durable_product_memory_activation_on_main: false
  live_grokfast_diagnostic_allowed_in_lab: true
  kimi_live_calls_allowed: false

dynamic_estimate_protocol:
  update_after_each_merge_or_logical_slice: true
  estimate_may_increase: true
  estimate_may_decrease: true
  report_remaining_slices_to_user: true
  persistent_truth_files:
    - docs/quality/advanced_product_lab_context_engineering_stress_pr_train.yaml
    - docs/quality/advanced_product_lab_context_engineering_golden_set.yaml
    - docs/quality/advanced_product_lab_context_engineering_mechanism_review.yaml

