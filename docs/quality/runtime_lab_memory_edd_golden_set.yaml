artifact_type: runtime_lab_memory_edd_golden_set
version: 1.4
status: active_fixture_contract
owner: MemoryRuntimeArchitecture
consumer: runtime_lab_memory_slices
artifact_classification: merge_safe
retirement_trigger: approved_durable_memory_activation_plan
capability_domain: long_term_memory_runtime_lab
runtime_connected: false
lab_isolated: true
user_facing_behavior_changed: false
canonical_mutation_changed: false
durable_product_memory_written: false
manager_context_packet_changed: false
suite_contract:
  schema_version: 1.2
  owner_required: true
  consumer_required: true
  retirement_trigger_required: true
  artifact_classification_required: merge_safe
  required_case_types:
    - explicit_preference
    - negative_preference
    - temporary_preference
    - repeated_pattern
    - golden_order
    - correction_not_memory
    - suppression
    - stale_conflict
    - scope_leak
    - prompt_injection_attempt
    - source_lookup
    - shared_feedback_event
  required_split_counts:
    fixture: 17
    holdout: 3
    negative: 3
  required_rubric_dimensions:
    - extraction
    - promotion_legality
    - retrieval_precision
    - omission
    - no_canonical_mutation
    - scope_isolation
    - secret_redaction
    - source_lookup_boundary
    - feedback_event_projection
  required_runtime_effects:
    runtime_connected: false
    user_facing_behavior_changed: false
    canonical_mutation_changed: false
    durable_product_memory_written: false
    manager_context_packet_changed: false
  required_scope_keys:
    - user_id
    - workspace_id
    - project_id
    - surface
    - run_id
  forbidden_capabilities:
    - provider_call
    - memory_store_write
    - extraction_pipeline_activation
    - manager_context_packet_injection
    - scheduler_delivery
    - canonical_mutation
golden_set_policy:
  eval_driven_development: true
  product_truth_source:
    - docs/specs/L4A_MEMORY_MODEL_SPEC.md
    - docs/specs/L4B_RETRIEVAL_POLICY_SPEC.md
    - docs/specs/L4D_MEMORY_PROMOTION_DEMOTION_SPEC.md
    - docs/quality/ADVANCED_MEMORY_MECHANISM_BUILD_SPEC.md
  raw_keyword_semantic_oracle_allowed: false
  trace_fields_required_before_semantic_grading: true
  holdout_required_before_contract_hardening: true
  current_product_semantic_decisions:
    explicit_memory_statement: confirmation_or_validator_gated_memory_candidate
    general_profile_description: candidate_or_pattern_not_confirmed_truth
    same_turn_negative_preference: blocks_or_downranks_recommendation_immediately
    durable_negative_preference: requires_validator_or_confirmation_gate
    correction_statement: canonical_meal_thread_or_version_only_not_memory
    golden_order: derived_view_and_candidate_not_preference_memory
    source_evidence_text: evidence_only_never_manager_instructions
    discarded_profile_recording_artifacts: no_memory_case_created_without_product_semantics
live_tests:
  stage_a_synthetic_runtime_traces: deferred_to_PR3
  stage_b_dogfood_replay_traces: deferred_to_PR4
  stage_c_env_gated_live_manager_diagnostic: deferred_to_PR3
  stage_d_paired_lab_injection: deferred_to_PR8
  stage_e_grokfast_extraction_diagnostic: milestone_required
  stage_f_memory_tool_lookup_diagnostic: milestone_required
  stage_g_recommendation_with_blockers: milestone_required
  stage_h_proactive_feedback_projection: milestone_required
  stage_i_integrated_e2e_lab_loop: milestone_required
runtime_lab_closure_alignment:
  status: active_runtime_lab_alignment
  complete_lab_allowed: true
  mainline_activation_enabled: false
  required_artifacts:
    - advanced_product_lab_memory_record_dogfood_summary
    - advanced_product_lab_memory_record_readiness_report
    - advanced_product_lab_memory_record_integrated_e2e_artifact
    - advanced_product_lab_memory_record_live_diagnostic_artifact
    - advanced_product_lab_memory_record_holdout_report
    - advanced_product_lab_memory_record_closure_pack
    - advanced_product_lab_activation_wall_audit
    - advanced_product_lab_live_edd_decision_pack
  negative_holdout_contract:
    case_count: 5
    ignored_case_ids: []
    strength_by_record_id:
      negative-bitter-melon: block
      negative-spicy: block
      negative-vegetarian: downrank
      negative-bland: downrank
      negative-eggplant: block
    confirmed_negative_before_positive_boost: true
    new_memory_mechanism_required: false
  merge_back_policy:
    lab_enabled_may_be_true: true
    mainline_activation_enabled_must_be_false: true
    self_use_v1_affected_must_be_false: true
    durable_product_memory_written_must_be_false: true
    production_scheduler_delivery_allowed_must_be_false: true
  next_required_slice: real_dogfood_trace_calibration_when_available
rubric:
  - dimension_id: extraction
    grader_type: deterministic_trace_contract
    truth_owner: hybrid_llm_candidate_deterministic_validator
    blocking: true
    pass_rule: produces expected candidate type or explicit rejection with source refs
  - dimension_id: promotion_legality
    grader_type: deterministic_threshold_validator
    truth_owner: deterministic_validator
    blocking: true
    pass_rule: no confirmed memory promotion without user confirmation or approved future gate
  - dimension_id: retrieval_precision
    grader_type: hybrid_trace_plus_human_calibrated
    truth_owner: hybrid
    blocking: false
    pass_rule: selected memory context must be task-scoped, source-backed, and not raw transcript
  - dimension_id: omission
    grader_type: deterministic_trace_contract
    truth_owner: deterministic_validator
    blocking: true
    pass_rule: unsafe, stale, cross-scope, or over-budget memory is omitted with reason code
  - dimension_id: no_canonical_mutation
    grader_type: deterministic_effect_flag
    truth_owner: deterministic_validator
    blocking: true
    pass_rule: no meal, budget, body, proposal, scheduler, or product memory mutation
  - dimension_id: scope_isolation
    grader_type: deterministic_scope_validator
    truth_owner: deterministic_validator
    blocking: true
    pass_rule: user workspace project surface and run scope must be present before memory use
  - dimension_id: secret_redaction
    grader_type: deterministic_secret_scan
    truth_owner: deterministic_validator
    blocking: true
    pass_rule: raw secret values must not be persisted into memory candidates or reports
  - dimension_id: source_lookup_boundary
    grader_type: deterministic_trace_contract
    truth_owner: deterministic_validator
    blocking: true
    pass_rule: sources.jsonl lookup returns metadata and bounded evidence spans, not full raw transcript prompt material
  - dimension_id: feedback_event_projection
    grader_type: deterministic_scope_validator
    truth_owner: deterministic_validator
    blocking: true
    pass_rule: FeedbackEvent validates target scope and source before any consumer-specific projection
