<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Meal Canary - Chat Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #849ebc; }
        .line-bg { background-color: #849ebc; }
        .line-green { background-color: #95ec79; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .chat-container { height: calc(100vh - 140px); overflow-y: auto; scroll-behavior: smooth; }
        .sidebar-container { height: calc(100vh - 40px); overflow-y: auto; }
        .bubble-left { position: relative; background: white; border-radius: 16px; border-top-left-radius: 4px; color: #1c1c1c; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble-right { position: relative; background: #95ec79; border-radius: 16px; border-top-right-radius: 4px; color: #1c1c1c; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #666; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #666, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #666, .5em 0 0 #666; } }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">

    <div class="flex h-full">
        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col line-bg relative">
            <!-- Header -->
            <div class="glass p-4 shadow-sm z-10 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-white font-bold">C</div>
                    <div>
                        <h1 class="font-semibold text-gray-800">Text Meal Canary</h1>
                        <span class="text-xs text-green-600 font-medium">● 實驗室運行中</span>
                    </div>
                </div>
                <button onclick="resetContext()" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-full hover:bg-red-200 transition">重置對話狀態</button>
            </div>

            <!-- Chat Area -->
            <div id="chat-box" class="chat-container p-6 space-y-4">
                <!-- Welcome Message -->
                <div class="flex items-start">
                    <div class="w-8 h-8 bg-green-500 rounded-full flex-shrink-0 mr-2 flex items-center justify-center text-[10px] text-white">AI</div>
                    <div class="bubble-left p-3 shadow-sm max-w-[80%] text-gray-800">
                        你好！我是你的熱量分析助手。你可以直接告訴我你吃了什麼，我會幫你分析並紀錄。
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="px-4 py-3 bg-white border-t border-gray-200">
                <div class="max-w-4xl mx-auto flex items-center space-x-2">
                    <input type="text" id="user-input" 
                           class="flex-1 p-2.5 rounded-2xl bg-gray-100 border-none focus:outline-none focus:ring-1 focus:ring-green-400 text-sm"
                           placeholder="今天吃了什麼嗎？"
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" id="send-btn"
                            class="text-green-500 font-bold px-4 py-2 active:opacity-60 transition">
                        傳送
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Dashboard Area -->
        <div class="w-96 bg-white border-l border-gray-200 p-4 sidebar-container shadow-2xl">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📊 歷史攝取紀錄 (MealLog)</h2>
            
            <div id="meal-logs" class="space-y-3">
                <!-- Log Items will appear here -->
                <div class="text-center text-gray-400 py-20 italic">尚無紀錄...</div>
            </div>

            <div class="mt-8 border-t pt-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Debug 實時狀態</h3>
                <div id="active-context-view" class="bg-gray-50 rounded-lg p-3 text-xs font-mono text-gray-600 break-words">
                    <span class="italic text-gray-400 italic">無掛起狀態 (Active Context)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const USER_ID = "test_user_" + Math.floor(Math.random() * 1000); 
        const STABLE_USER_ID = "digital_twin_test_01"; 
        let messageCounter = 0;

        function getNextId() {
            return 'msg-' + (++messageCounter);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            appendMessage('user', text);
            input.value = '';
            
            // Show subtle typing indicator
            const loadingId = appendMessage('bot', '<span class="loading-dots text-gray-400">...</span>');
            
            try {
                const res = await fetch('/estimate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        user_id: STABLE_USER_ID,
                        allow_search: true
                    })
                });
                const data = await res.json();
                
                updateBotMessage(loadingId, data.coach_message);
                refreshLogs();
            } catch (err) {
                updateBotMessage(loadingId, "連線失敗，請檢查後端是否正常運行。");
            }
        }

        function appendMessage(role, text) {
            const id = getNextId();
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex items-start justify-end w-full' : 'flex items-start w-full';
            
            if(role === 'bot') {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full flex-shrink-0 mr-2 flex items-center justify-center bg-gray-200 overflow-hidden shadow-sm">
                        <span class="text-[10px] font-bold text-gray-500">AI</span>
                    </div>
                    <div id="${id}" class="bubble-left p-3 text-sm max-w-[75%] whitespace-pre-wrap">${text}</div>
                `;
            } else {
                div.innerHTML = `
                    <div id="${id}" class="bubble-right p-3 text-sm max-w-[75%] whitespace-pre-wrap">${text}</div>
                `;
            }
            
            chatBox.appendChild(div);
            // Ensure we scroll to the bottom
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 10);
            return id;
        }

        function updateBotMessage(id, text) {
            const el = document.getElementById(id);
            if(el) {
                el.innerHTML = text;
            }
            const chatBox = document.getElementById('chat-box');
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 10);
        }

        async function refreshLogs() {
            try {
                const res = await fetch(`/user/${STABLE_USER_ID}/logs`);
                const data = await res.json();
                const logContainer = document.getElementById('meal-logs');
                
                if(data.logs.length === 0) return;

                logContainer.innerHTML = data.logs.map(log => `
                    <div class="bg-white border rounded-xl p-3 shadow-sm hover:shadow-md transition">
                        <div class="flex justify-between items-start mb-1">
                            <span class="font-bold text-gray-800">${log.meal_title}</span>
                            <span class="text-xs text-gray-400">${new Date(log.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div class="grid grid-cols-4 gap-1 text-[10px] text-center mb-2">
                             <div class="bg-orange-50 text-orange-600 rounded p-1"><b>${log.kcal}</b> kcal</div>
                             <div class="bg-blue-50 text-blue-600 rounded p-1"><b>${log.protein}g</b> P</div>
                             <div class="bg-green-50 text-green-600 rounded p-1"><b>${log.carb}g</b> C</div>
                             <div class="bg-red-50 text-red-600 rounded p-1"><b>${log.fat}g</b> F</div>
                        </div>
                        <div class="text-[10px] text-gray-500 truncate">
                            ${log.components.map(c => c.name + '(' + (c.portion_hint || '一般') + ')').join(', ')}
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Refresh logs failed", err); }
        }

        async function resetContext() {
            if(!confirm("確定要重置目前的對話狀態嗎？歷史紀錄將保留。")) return;
            await fetch(`/user/${STABLE_USER_ID}/context/reset`, { method: 'POST' });
            alert("狀態已清除！");
            location.reload();
        }

        // Initial Load
        refreshLogs();
    </script>
</body>
</html>
