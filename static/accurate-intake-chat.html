<!doctype html>
<html lang="zh-Hant" data-page-id="accurate-intake-chat-page-v1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accurate Intake Chat</title>
  <style>
    :root {
      --ink: #17211d;
      --muted: #5f6b66;
      --paper: #eef2f1;
      --panel: #ffffff;
      --line: #ccd6d2;
      --user: #67d881;
      --bot: #ffffff;
      --accent: #1f7a3d;
      --shadow: 0 12px 34px rgba(31, 45, 39, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Aptos", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .brand {
      font-weight: 900;
      font-size: 18px;
    }
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    nav a {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 11px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
    }
    nav a[aria-current="page"] {
      background: var(--ink);
      color: #fff;
    }
    main {
      width: min(920px, calc(100vw - 32px));
      margin: 18px auto;
      display: grid;
      min-height: calc(100vh - 92px);
    }
    .chat-card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 720px;
      max-height: calc(100vh - 112px);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .chat-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #f8faf9;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      line-height: 1.1;
    }
    .subtle {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }
    .setup {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 8px;
      min-width: 330px;
    }
    .setup-panel {
      justify-self: end;
      min-width: min(330px, 100%);
    }
    .setup-panel summary {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
    }
    .setup-panel[open] summary {
      margin-bottom: 8px;
    }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    input, button {
      font: inherit;
      min-height: 44px;
    }
    input {
      width: 100%;
      border: 1px solid rgba(23, 33, 29, 0.14);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
    }
    input:focus-visible,
    button:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(31, 122, 61, 0.34);
      outline-offset: 2px;
    }
    #chat-scroll {
      overflow-y: auto;
      padding: 18px;
      background: #dce7e4;
    }
    .message {
      display: flex;
      gap: 9px;
      margin-bottom: 14px;
      align-items: flex-start;
    }
    .message.user { justify-content: flex-end; }
    .avatar {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }
    .bubble {
      max-width: min(76%, 640px);
      border-radius: 8px;
      padding: 11px 13px;
      line-height: 1.55;
      background: var(--bot);
      box-shadow: 0 2px 6px rgba(26, 22, 17, 0.12);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .user .bubble {
      background: var(--user);
    }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #f8faf9;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 16px;
      background: var(--ink);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    button.secondary {
      background: #e3efe8;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .status {
      color: var(--muted);
      font-size: 12px;
      padding: 0 16px 12px;
      background: #f8faf9;
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }
    @media (max-width: 760px) {
      .topbar,
      .chat-header {
        grid-template-columns: 1fr;
      }
      .topbar {
        display: grid;
      }
      .setup {
        min-width: 0;
        grid-template-columns: 1fr;
      }
      .setup-panel {
        justify-self: stretch;
      }
      .setup-panel summary {
        justify-content: flex-start;
      }
      main {
        width: calc(100vw - 16px);
        margin: 8px auto;
      }
      .chat-card {
        min-height: 680px;
      }
      .composer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app" data-surface-role="chat">
    <header class="topbar">
      <div class="brand">Accurate Intake</div>
      <nav aria-label="Accurate Intake pages">
        <a data-nav-target="chat" href="/static/accurate-intake-chat.html" aria-current="page">Chat</a>
        <a data-nav-target="today" href="/static/accurate-intake-today.html">Today</a>
        <a data-nav-target="body" href="/static/accurate-intake-body.html">Body</a>
      </nav>
    </header>
    <main>
      <section class="chat-card" aria-label="Accurate Intake chat">
        <header class="chat-header">
          <div>
            <h1>Chat</h1>
            <p class="subtle">像 LINE 一樣輸入和回看飲食對話；這頁只送出訊息並顯示助理回覆。</p>
          </div>
          <details class="setup-panel">
            <summary>Conversation settings</summary>
            <div class="setup">
              <label>User ID
                <input id="user-id" value="local-self-use-001" autocomplete="off" />
              </label>
              <label>Date
                <input id="local-date" type="date" />
              </label>
              <label>Local access token
                <input id="local-access-token" type="password" autocomplete="off" />
              </label>
            </div>
          </details>
        </header>
        <div id="chat-scroll" aria-live="polite">
          <div class="message bot">
            <div class="avatar">AI</div>
            <div class="bubble">今天想記什麼？我會接著你的飲食對話繼續記錄。</div>
          </div>
        </div>
        <form id="composer" class="composer">
          <input id="message-input" name="message" autocomplete="off" aria-label="Message" placeholder="例如：早餐吃茶葉蛋和拿鐵" />
          <button id="send-button" type="submit">送出</button>
        </form>
        <div id="chat-history-status" class="status" aria-live="polite">Conversation history not loaded.</div>
      </section>
    </main>
    <span hidden>product_readiness_claimed=false private_self_use_approved=false</span>
  </div>
  <script>
    const endpoints = {
      estimate: "/estimate",
      chatHistory: "/accurate-intake/chat-history"
    };
    const todayIso = () => new Date().toISOString().slice(0, 10);
    const el = (id) => document.getElementById(id);
    const params = new URLSearchParams(window.location.search);
    el("user-id").value = params.get("user_id") || el("user-id").value;
    el("local-date").value = params.get("local_date") || todayIso();

    function userId() {
      return el("user-id").value.trim() || "default_user";
    }
    function selectedDate() {
      return el("local-date").value || todayIso();
    }
    function pageUrl(page) {
      return `/static/accurate-intake-${page}.html?user_id=${encodeURIComponent(userId())}&local_date=${encodeURIComponent(selectedDate())}`;
    }
    function updateNavigationLinks() {
      document.querySelectorAll("[data-nav-target]").forEach((link) => {
        const target = link.getAttribute("data-nav-target");
        if (target) {
          link.href = pageUrl(target);
        }
      });
    }
    function setStatus(value) {
      el("chat-history-status").textContent = `Conversation ${value}.`;
    }
    function localDebugHeaders(url) {
      const inputToken = el("local-access-token")?.value.trim() || "";
      const globalToken = typeof window.LOCAL_DEBUG_API_TOKEN === "string" ? window.LOCAL_DEBUG_API_TOKEN.trim() : "";
      const token = inputToken || globalToken;
      if (!token) {
        return {};
      }
      const pathname = new URL(url, window.location.href).pathname;
      if (pathname !== endpoints.chatHistory) {
        return {};
      }
      return { "X-Local-Debug-Token": token };
    }
    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text || "";
      if (role === "bot") {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "AI";
        row.append(avatar, bubble);
      } else {
        row.append(bubble);
      }
      el("chat-scroll").append(row);
      el("chat-scroll").scrollTop = el("chat-scroll").scrollHeight;
      return bubble;
    }
    function clearHistory() {
      el("chat-scroll").innerHTML = "";
    }
    async function requestJson(url, options = {}) {
      const headers = { ...(options.headers || {}), ...localDebugHeaders(url) };
      const response = await fetch(url, { ...options, headers });
      const text = await response.text();
      const payload = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(payload.error || payload.detail || `HTTP ${response.status}`);
      }
      return payload;
    }
    function renderHistory(payload) {
      clearHistory();
      const messages = Array.isArray(payload.messages) ? payload.messages : [];
      if (!messages.length) {
        appendMessage("bot", "這一天還沒有聊天紀錄。");
        return;
      }
      for (const message of messages) {
        const role = message.role === "user" ? "user" : "bot";
        appendMessage(role, message.content || "");
      }
    }
    async function loadHistory() {
      setStatus("loading");
      const query = new URLSearchParams({ user_id: userId(), local_date: selectedDate() });
      const payload = await requestJson(`${endpoints.chatHistory}?${query.toString()}`);
      renderHistory(payload);
      setStatus(`loaded ${payload.message_count || 0}`);
    }
    async function submitMessage(event) {
      event.preventDefault();
      const input = el("message-input");
      const text = input.value.trim();
      if (!text) return;
      appendMessage("user", text);
      input.value = "";
      const pending = appendMessage("bot", "處理中...");
      try {
        const payload = await requestJson(endpoints.estimate, {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify({ text, user_id: userId(), allow_search: false })
        });
        pending.textContent = payload.coach_message || "目前沒有可顯示的助理回覆。";
        await loadHistory();
      } catch (error) {
        pending.textContent = `送出失敗：${error.message}`;
      }
    }
    el("composer").addEventListener("submit", submitMessage);
    el("local-date").addEventListener("change", () => {
      updateNavigationLinks();
      loadHistory().catch((error) => setStatus(`failed ${error.message}`));
    });
    el("user-id").addEventListener("change", () => {
      updateNavigationLinks();
      loadHistory().catch((error) => setStatus(`failed ${error.message}`));
    });
    updateNavigationLinks();
    loadHistory().catch((error) => setStatus(`failed ${error.message}`));
  </script>
</body>
</html>
